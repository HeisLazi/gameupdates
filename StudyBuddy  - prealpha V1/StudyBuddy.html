  ghost_dog:  { id:'ghost_dog',  name:'Pointer',    icon:'🐕', tier:'legendary', desc:'On lethal damage, survives with 1 HP and barks (1× per fight).' },
};
const PET_LIST = Object.values(PET_REGISTRY);

function petOf(state){ return state.pet ? PET_REGISTRY[state.pet] : null; }

function petOnCorrect(state, correctStreakTotal){
  if (state.pet === 'data_slime' && correctStreakTotal > 0 && correctStreakTotal % 3 === 0){
    const heal = Math.round(10 * petScale(getPetLevel(state)));
    return { heal, msg: `🧪 Buffer digested data — +${heal} HP` };
  }
  return null;
}

function petOnEnemyKilled(state){
  if (state.pet === 'cache_cat'){
    const lvl = getPetLevel(state);
    const insight = lvl >= 4 ? 2 : 1;
    return { insight, msg: `🐈 Cachey snagged ${insight === 2 ? 'two stray bytes' : 'a stray byte'} — +${insight} 💡` };
  }
  return null;
}

function petDamageMultiplier(state, combo){
  if (state.pet === 'syntax_fox'){
    const lvl = getPetLevel(state);
    const perStack = 0.05 + ((lvl - 1) * 0.01); // L1: 5%, L5: 9% per stack
    const maxStacks = Math.min(5 + (lvl - 1), 10); // L1: 5, L5: 9 stacks
    const stack = Math.min(maxStacks, Math.max(0, combo));
    return { mult: 1 + stack * perStack, msg: stack > 0 ? `🦊 Syntax stacks ×${stack} (+${Math.round(stack*perStack*100)}% dmg)` : null };
  }
  return { mult: 1, msg: null };
}

function petOnStreakLoss(state){
  if (state.pet === 'syntax_fox'){
    const lvl = getPetLevel(state);
    const hpLoss = Math.max(1, Math.round(5 / petScale(lvl))); // higher level = less self-damage
    return { hpLoss, msg: `🦊 Syntax lost the trail (-${hpLoss} HP)` };
  }
  return null;
}

function petOnTurnStart(state, currentHp, maxHp){
  if (state.pet === 'void_drone' && currentHp <= maxHp * 0.5){
    const block = Math.round(10 * petScale(getPetLevel(state)));
    return { block, msg: `🛸 DRN-01 deployed shield — +${block} Block` };
  }
  return null;
}

function petShouldHighlightOnInsight(state, alreadyUsedThisFight){
  return state.pet === 'pixel_owl' && !alreadyUsedThisFight;
}

/* Pixel Owl: hides 2 wrong choices at L1, +1 per 2 levels (L3=3, L5=4). */
function petOwlHidesCount(state){
  const lvl = getPetLevel(state);
  return 2 + Math.floor((lvl - 1) / 2);
}

function petOnWrong(state, alreadyTriggered){
  if (state.pet === 'bug_beetle' && !alreadyTriggered){
    return { freeReveal: true, msg: '🪲 Debuggy traced the error — next answer revealed' };
  }
  return null;
}

/* Beetle: 1 reveal at L1, 2 at L3, 3 at L5 (uses count instead of bool flag). */
function petBeetleMaxUses(state){
  const lvl = getPetLevel(state);
  if (lvl >= 5) return 3;
  if (lvl >= 3) return 2;
  return 1;
}

function petOnLethal(state, alreadyTriggered){
  if (state.pet === 'ghost_dog' && !alreadyTriggered){
    const reviveHp = Math.round(1 * petScale(getPetLevel(state)));
    return { reviveHp, msg: `🐕 Pointer broke the loop — revived at ${reviveHp} HP` };
  }
  return null;
}

/* ---------- PRESTIGE PERK READERS ---------- */
function prestigeFlags(state){
  const p = state.prestigePerk;
  return {
    photoMemory:  p === 'photographic_memory',
    doubleMajor:  p === 'double_major',
    funding:      p === 'funding_secured',
    speedLearner: p === 'speed_learner',
    rank: state.prestigeRank || 0,
    xpMul: 1 + ((state.prestigeRank || 0) * 0.20),
  };
}

/* ---------- MEMORY WRAITH SPAWN HELPER ---------- */
function maybeSpawnWraith(state, allModuleQuestions){
  const pool = (state.arena && state.arena.mistakePool) || [];
  if (pool.length === 0) return null;
  if (Math.random() > 0.20) return null;
  const qid = pool[Math.floor(Math.random() * pool.length)];
  const q = allModuleQuestions.find(x => x.id === qid);
  if (!q) return null;
  return {
    id: 'wraith_' + qid + '_' + Date.now(),
    name: 'Memory Wraith', emoji: '👻',
    type: 'minion', tier: 'minion',
    hp: 30, maxHp: 30,
    dmg: { light: 4, heavy: 8 },
    pattern: ['light', 'light', 'heavy'],
    isWraith: true, haunts: qid, forcedQuestion: q,
  };
}

function onWraithDefeated(state, setState, wraith){
  const pool = (state.arena && state.arena.mistakePool) || [];
  setState({
    ...state,
    arena: { ...state.arena, mistakePool: pool.filter(qid => qid !== wraith.haunts) },
    xp: (state.xp || 0) + 30,
  });
}

function getWeaponMasteryBonuses(weaponId, currentLevel){
  const totals = {
    critChance: 0, critDmgMult: 1.5, streakFlatDmg: 0,
    flatBlock: 0, flatHeal: 0, flatDmg: 0, dmgMult: 0,
    hpBonusRatio: 0, xpBonus: 0, startMomentum: 0, pierce: 0,
    startInsight: 0, insightCapBonus: 0, forgiveCount: 0,
  };
  const path = WEAPON_MASTERY_BONUSES[weaponId] || [];
  for (const milestone of path){
    if ((currentLevel || 1) >= milestone.level){
      for (const k of Object.keys(milestone.stats)) totals[k] += milestone.stats[k];
    }
  }
  return totals;
}

function getTreePassives(unlockedSkillIds){
  const totals = {
    passiveFlatDmg: 0, passiveMaxHp: 0, passivePierce: 0, passiveXpBonus: 0,
    passiveHealOnCorrect: 0, passiveStartMomentum: 0, passiveStartInsight: 0,
    passiveInsightCapBonus: 0, passiveBlockOnCorrect: 0, passiveMaxMomentumBonus: 0,
    passiveStreakFlatDmg: 0, passiveRevive: 0, passiveForgiveCount: 0,
    passiveCritChance: 0, passiveDmgTakenMult: 1.0,
    passiveMomentumOnStreak: 0, passiveBlockOnStreak5: 0, passiveMomentumOnDmgTaken: 0,
    passiveBerserkThreshold: 0, passiveBerserkMult: 0,
    passiveDmgReduction: 0, passiveHealOnMomentum: 0,
    passiveLuckyGuess: 0, passiveDmgPerInsight: 0, passiveInsightDodgeChance: 0,
  };
  for (const id of (unlockedSkillIds || [])){
    const a = ABILITIES[id];
    if (!a || a.kind !== 'passive') continue;
    for (const k of Object.keys(totals)){
      if (typeof a[k] === 'number'){
        if (k === 'passiveDmgTakenMult') totals[k] *= a[k];
        else totals[k] += a[k];
      }
    }
  }
  return totals;
}

function getCombinedStats(state){
  const arena = state.arena || {};
  const weaponId = arena.equipped || 'blade';
  const weaponLvl = arena.weapons?.[weaponId]?.level || 1;
  const mastery   = getWeaponMasteryBonuses(weaponId, weaponLvl);
  const passives  = getTreePassives(arena.unlockedSkills);
  const augments  = (typeof getAugmentBonuses === 'function') ? getAugmentBonuses(state) : {};
  return {
    weaponId, weaponLvl, mastery, passives, augments,
    critChance:    (mastery.critChance || 0) + (passives.passiveCritChance || 0),
    critDmgMult:    mastery.critDmgMult || 1.5,
    flatDmg:       (mastery.flatDmg || 0) + (passives.passiveFlatDmg || 0),
    streakFlatDmg: (mastery.streakFlatDmg || 0) + (passives.passiveStreakFlatDmg || 0),
    dmgMult:       (mastery.dmgMult || 0) + (augments.dmgMult || 0),
    pierce:        (mastery.pierce || 0) + (passives.passivePierce || 0),
    xpBonus:       (mastery.xpBonus || 0) + (passives.passiveXpBonus || 0) + (augments.xpBonus || 0),
    flatBlock:      mastery.flatBlock || 0,
    flatHeal:       mastery.flatHeal || 0,
    startMomentum: (mastery.startMomentum || 0) + (passives.passiveStartMomentum || 0),
    startInsight:  (mastery.startInsight || 0) + (passives.passiveStartInsight || 0),
    insightCapBonus:(mastery.insightCapBonus || 0) + (passives.passiveInsightCapBonus || 0),
    maxMomentumBonus: passives.passiveMaxMomentumBonus || 0,
    forgiveCount:  (mastery.forgiveCount || 0) + (passives.passiveForgiveCount || 0),
    revivesAvailable: passives.passiveRevive || 0,
    healOnCorrect: passives.passiveHealOnCorrect || 0,
    blockOnCorrect: passives.passiveBlockOnCorrect || 0,
    healOnMomentum: passives.passiveHealOnMomentum || 0,
    momentumOnStreak: passives.passiveMomentumOnStreak || 0,
    blockOnStreak5: passives.passiveBlockOnStreak5 || 0,
    momentumOnDmgTaken: passives.passiveMomentumOnDmgTaken || 0,
    dmgReduction:  (passives.passiveDmgReduction || 0) + (augments.capLargeHits || 0),
    dmgTakenMult:  passives.passiveDmgTakenMult || 1.0,
    berserkThreshold: passives.passiveBerserkThreshold || 0,
    berserkMult:    passives.passiveBerserkMult || 0,
    luckyGuess:     passives.passiveLuckyGuess || 0,
    dmgPerInsight:  passives.passiveDmgPerInsight || 0,
    insightDodgeChance: passives.passiveInsightDodgeChance || 0,
    maxHpBonus:    (augments.maxHpBonus || 0) + (passives.passiveMaxHp || 0),
    hpCap:          augments.hpCap || null,
    blockPerTurn:   augments.blockPerTurn || 0,
    thornsRatio:    augments.thornsRatio || 0,
  };
}

const ENEMY_PASSIVES = {
  /* MINION */
  passive_swarm:        { id:'passive_swarm',        name:'Swarm Tactics', tier:'minion', desc:'+2 damage per other living enemy.' },
  passive_frail:        { id:'passive_frail',        name:'Frail',         tier:'minion', desc:'Takes 2× damage from Critical Hits.' },
  passive_explosive:    { id:'passive_explosive',    name:'Volatile',      tier:'minion', desc:'On death, deals 10 damage to player.' },
  passive_evasive:      { id:'passive_evasive',      name:'Evasive',       tier:'minion', desc:'20% chance to dodge any player attack.' },
  passive_coward:       { id:'passive_coward',       name:'Coward',        tier:'minion', desc:'If last enemy alive, flees (no XP granted).' },
  passive_pack:         { id:'passive_pack',         name:'Pack Mentality',tier:'minion', desc:'+5 Max HP per other living enemy at spawn.' },

  /* ELITE */
  passive_thick_hide:   { id:'passive_thick_hide',   name:'Thick Hide',    tier:'elite', desc:'Reduces incoming damage by 5.' },
  passive_spikes:       { id:'passive_spikes',       name:'Spiked Armor',  tier:'elite', desc:'When player attacks this, player takes 3 damage.' },
  passive_anti_magic:   { id:'passive_anti_magic',   name:'Anti-Magic',    tier:'elite', desc:'Tree-source abilities deal 50% less damage.' },
  passive_punisher:     { id:'passive_punisher',     name:'Punisher',      tier:'elite', desc:'Deals 2× damage if player streak is 0.' },
  passive_thorns:       { id:'passive_thorns',       name:'Thorns',        tier:'elite', desc:'Reflects 20% of damage taken back to player.' },
  passive_regenerator:  { id:'passive_regenerator',  name:'Regenerator',   tier:'elite', desc:'Heals 5 HP each turn.' },

  /* BOSS */
  passive_unstoppable:  { id:'passive_unstoppable',  name:'Unstoppable',   tier:'boss',  desc:'Immune to skip-turn effects.' },
  passive_adaptive:     { id:'passive_adaptive',     name:'Adaptive',      tier:'boss',  desc:'Player using same ability twice in a row deals 50% less damage.' },
  passive_boss_armor:   { id:'passive_boss_armor',   name:'Boss Armor',    tier:'boss',  desc:'Single-hit damage capped at 50.' },
  passive_second_phase: { id:'passive_second_phase', name:'Second Phase',  tier:'boss',  desc:'Once per fight, on death revive at 50% HP.' },
  passive_jealousy:     { id:'passive_jealousy',     name:'Jealousy',      tier:'boss',  desc:'+3 damage per Insight player holds.' },
  passive_academic_probation:{ id:'passive_academic_probation', name:'Academic Probation', tier:'boss', desc:'While alive, player healing capped at 50% Max HP.' },
  passive_knowledge_eater:{ id:'passive_knowledge_eater', name:'Knowledge Eater', tier:'boss', desc:'Heals 20 HP whenever player answers wrong.' },
};

function _pickFromTier(registry, tier, count){
  const pool = Object.values(registry).filter(x => x.tier === tier);
  const a = pool.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a.slice(0, count);
}

function generateEnemy(name, tier, level, opts){
  opts = opts || {};
  const lvl = Math.max(1, level || 1);
  const tierConfig = {
    minion: { hp: 20 + lvl*5,   patternLen: 3, passives: 1, emoji:'👾' },
    elite:  { hp: 60 + lvl*15,  patternLen: 4, passives: 1, emoji:'🤺' },
    boss:   { hp: 150 + lvl*30, patternLen: 5, passives: 2, emoji:'👑' },
  };
  const cfg = tierConfig[tier] || tierConfig.minion;
  const abilityPool = opts.abilityWhitelist
    ? Object.values(ENEMY_ABILITIES).filter(a => opts.abilityWhitelist.includes(a.id))
    : Object.values(ENEMY_ABILITIES).filter(a => a.tier === tier);
  const a = abilityPool.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  const pattern = a.slice(0, cfg.patternLen).map(x => x.id);
  const passivePool = opts.passiveWhitelist
    ? Object.values(ENEMY_PASSIVES).filter(p => opts.passiveWhitelist.includes(p.id))
    : Object.values(ENEMY_PASSIVES).filter(p => p.tier === tier);
  const passives = _pickFromTier({...passivePool.reduce((acc,p)=>{acc[p.id]=p;return acc;},{})}, tier, cfg.passives).map(p => p.id);
  return {
    id: 'enemy_' + tier + '_' + Date.now() + '_' + Math.floor(Math.random()*1000),
    name: opts.name || (tier === 'minion' ? 'Minion' : tier === 'elite' ? 'Elite' : 'Boss'),
    emoji: opts.emoji || cfg.emoji,
    type: tier, tier: tier, level: lvl,
    hp: opts.hpOverride || cfg.hp,
    maxHp: opts.hpOverride || cfg.hp,
    block: 0,
    pattern, patternIndex: 0,
    passives,
    enrageBonus: 0, hasRevived: false, hasEvasion: false, isShielded: false,
  };
}

function resolveEnemyAction(enemy, state, allEnemies){
  const log = [];
  const result = { enemy:{...enemy}, log, dmgToPlayer:0, summons:[], effects:{}, wasEvaded:false, selfDestructed:false };
  const ability = ENEMY_ABILITIES[enemy.pattern[enemy.patternIndex % enemy.pattern.length]];
  if (!ability){
    result.enemy.patternIndex = (enemy.patternIndex + 1) % enemy.pattern.length;
    return result;
  }

  let dmg = ability.getDmg ? ability.getDmg(enemy.level || 1) : 0;
  dmg += enemy.enrageBonus || 0;

  if ((enemy.passives||[]).includes('passive_swarm')){
    const others = allEnemies.filter(e => e.hp > 0 && e.id !== enemy.id).length;
    if (others > 0) dmg += 2 * others;
  }
  if ((enemy.passives||[]).includes('passive_punisher') && (state.streak?.count||0) === 0){
    dmg = dmg * 2;
    log.push(`${enemy.name} punishes broken streak — doubled damage`);
  }
  if ((enemy.passives||[]).includes('passive_jealousy')){
    dmg += 3 * (state.insights || 0);
  }

  result.dmgToPlayer = dmg;
  if (dmg > 0) log.push(`${enemy.emoji} ${enemy.name}: ${ability.name} → ${dmg} dmg`);
  else if (ability.intent !== 'telegraph') log.push(`${enemy.emoji} ${enemy.name}: ${ability.name}`);

  if (ability.getHeal){
    const h = ability.getHeal(enemy.level || 1);
    result.enemy.hp = Math.min(enemy.maxHp, enemy.hp + h);
    log.push(`${enemy.name} healed +${h}`);
  }
  if (ability.getBlock){
    const b = ability.getBlock(enemy.level || 1);
    result.enemy.block = (enemy.block || 0) + b;
    log.push(`${enemy.name} blocks ${b}`);
  }

  switch (ability.effect){
    case 'drain_momentum':       result.effects.drainMomentum = 1; break;
    case 'drain_insight':        result.effects.drainInsight = 1; break;
    case 'apply_poison':         result.effects.applyPoison = 3; break;
    case 'self_destruct':        result.selfDestructed = true; result.enemy.hp = 0; break;
    case 'gain_evasion':         result.enemy.hasEvasion = true; break;
    case 'force_target':         result.effects.forceTargetId = enemy.id; break;
    case 'reset_streak':         result.effects.resetStreak = true; break;
    case 'increase_cooldowns':   result.effects.increaseCooldowns = 1; break;
    case 'buff_allies_dmg':      result.effects.buffAlliesDmg = 5; break;
    case 'shield_allies':        result.effects.shieldAllies = 15; break;
    case 'permanent_dmg_up':     result.enemy.enrageBonus = (enemy.enrageBonus || 0) + 5; log.push(`${enemy.name} enraged (+5 permanent)`); break;
    case 'heal_all_allies':      result.effects.healAlliesPct = 0.5; break;
    case 'anti_heal':            result.effects.antiHeal = true; break;
    case 'lock_advanced_skills': result.effects.lockAdvanced = true; break;
    case 'attack_self':          result.effects.attackSelf = true; break;
    case 'wipe_player_buffs':    result.effects.wipePlayerBuffs = true; break;
    case 'halve_player_hp':      result.effects.halveHp = true; break;
    case 'steal_all_momentum':   result.effects.stealAllMomentum = true; break;
    case 'ultimatum_check':      result.effects.ultimatumCheck = true; break;
  }

  if (ability.intent === 'summon' && ability.spawnTier){
    for (let i = 0; i < (ability.spawnCount || 1); i++){
      result.summons.push(generateEnemy(
        ability.spawnTier === 'elite' ? 'Summoned Proctor' : 'Summoned Add',
        ability.spawnTier,
        Math.max(1, (enemy.level||1) - 1)
      ));
    }
    log.push(`${enemy.name} summons ${ability.spawnCount || 1} ${ability.spawnTier}(s)`);
  }

  if ((enemy.passives||[]).includes('passive_regenerator')){
    result.enemy.hp = Math.min(enemy.maxHp, result.enemy.hp + 5);
    log.push(`${enemy.name} regens +5 HP`);
  }

  result.enemy.patternIndex = (enemy.patternIndex + 1) % enemy.pattern.length;
  return result;
}

function applyEnemyPassivesOnHit(enemy, dmgIn, ctx){
  const log = [];
  let dmg = dmgIn;
  let reflected = 0;
  ctx = ctx || {};
  const passives = enemy.passives || [];

  if (passives.includes('passive_evasive') && Math.random() < 0.20){
    log.push(`${enemy.name} dodged the attack`);
    return { dmgFinal: 0, dmgReflectedToPlayer: 0, log, dodged: true };
  }
  if (enemy.hasEvasion){
    log.push(`${enemy.name} evaded (cower)`);
    return { dmgFinal: 0, dmgReflectedToPlayer: 0, log, dodged: true, clearEvasion: true };
  }
  if (passives.includes('passive_thick_hide')){
    dmg = Math.max(1, dmg - 5);
  }
  if (passives.includes('passive_anti_magic') && ctx.abilitySource === 'tree'){
    dmg = Math.floor(dmg * 0.5);
    log.push(`${enemy.name} resists the tree spell (×0.5)`);
  }
  if (passives.includes('passive_adaptive') && ctx.lastPlayerAbility && ctx.currentPlayerAbility === ctx.lastPlayerAbility){
    dmg = Math.floor(dmg * 0.5);
    log.push(`${enemy.name} adapted to repeat ability (×0.5)`);
  }
  if (passives.includes('passive_boss_armor') && dmg > 50){
    dmg = 50;
    log.push(`${enemy.name} caps the hit at 50`);
  }
  if (passives.includes('passive_frail') && ctx.wasCrit){
    dmg = dmg * 2;
    log.push(`${enemy.name} took 2× from crit`);
  }
  if (passives.includes('passive_thorns')){
    reflected = Math.floor(dmg * 0.20);
    if (reflected > 0) log.push(`Thorns reflect ${reflected} damage back`);
  }
  if (passives.includes('passive_spikes')){
    reflected += 3;
    log.push(`Spikes prick for 3 damage`);
  }
  return { dmgFinal: dmg, dmgReflectedToPlayer: reflected, log };
}

function onEnemyDeath(enemy, allEnemies){
  const log = [];
  let extraDmgToPlayer = 0;
  let suppressXp = false;
  let revivedEnemy = null;
  const passives = enemy.passives || [];

  if (passives.includes('passive_explosive')){
    extraDmgToPlayer += 10;
    log.push(`${enemy.name} explodes — 10 dmg to player`);
  }
  if (passives.includes('passive_coward') && allEnemies.filter(e => e.hp > 0 && e.id !== enemy.id).length === 0){
    suppressXp = true;
    log.push(`${enemy.name} flees — no XP`);
  }
  if (passives.includes('passive_second_phase') && !enemy.hasRevived){
    revivedEnemy = { ...enemy, hp: Math.floor(enemy.maxHp * 0.5), hasRevived: true };
    log.push(`${enemy.name} enters Phase 2 (revived at 50%)`);
  }
  return { extraDmgToPlayer, suppressXp, log, revivedEnemy };
}

function applySpawnTimePassives(enemy, allEnemies){
  const out = {...enemy};
  if ((out.passives||[]).includes('passive_pack')){
    const others = allEnemies.filter(e => e.id !== out.id).length;
    out.maxHp = out.maxHp + (5 * others);
    out.hp = out.hp + (5 * others);
  }
  return out;
}


/* ============ MULTI-MOB COMBAT HELPERS ============ *
 * Splice into build_html.py AFTER enemies.jsx (depends on generateEnemy).
 * UI components + state helpers for multiple-enemy fights.
 *
 * STATE SHAPE
 *   state.arena.enemies     = [Enemy, ...]   (replaces single `boss`)
 *   state.arena.targetIndex = number          (which enemy is being attacked)
 *   state.arena.statusEffects = {             (player-side debuffs from enemy effects)
 *     poisonStacks, poisonDmgPerTurn, antiHeal, confused, advancedLocked, forcedTarget
 *   }
 */

function defaultStatusEffects(){
  return {
    poisonStacks: 0, poisonDmgPerTurn: 3,
    antiHeal: false, confused: false, advancedLocked: false, forcedTarget: null,
  };
}

/* ---------- TARGETING ---------- */
function getCurrentTarget(state){
  const enemies = (state.arena && state.arena.enemies) || [];
  const idx = (state.arena && typeof state.arena.targetIndex === 'number') ? state.arena.targetIndex : 0;
  return enemies[idx] || enemies.find(e => e.hp > 0) || null;
}

function setTarget(state, setState, idx){
  const enemies = (state.arena && state.arena.enemies) || [];
  if (!enemies[idx] || enemies[idx].hp <= 0) return;
  setState({...state, arena:{...state.arena, targetIndex: idx}});
}

function retargetAfterKill(state, setState){
  const enemies = (state.arena && state.arena.enemies) || [];
  const living = enemies.map((e,i)=>({e,i})).filter(x => x.e.hp > 0);
  if (living.length === 0) return;
  const cur = enemies[state.arena.targetIndex];
  if (cur && cur.hp > 0) return;
  living.sort((a,b)=> a.e.hp - b.e.hp);
  setState({...state, arena:{...state.arena, targetIndex: living[0].i}});
}

/* ---------- DAMAGE ROUTING ---------- */
function routeDamageToTarget(state, dmg, ctx){
  const enemies = (state.arena.enemies || []).map(e => ({...e}));
  const idx = state.arena.targetIndex || 0;
  const target = enemies[idx];
  if (!target || target.hp <= 0) return { newEnemies: enemies, killed: null, reflected: 0, log: [] };

  const passResult = applyEnemyPassivesOnHit(target, dmg, ctx);
  const log = passResult.log.slice();
  let killed = null;

  let dmgAfterBlock = passResult.dmgFinal;
  if ((target.block || 0) > 0 && dmgAfterBlock > 0){
    const absorbed = Math.min(target.block, dmgAfterBlock);
    target.block -= absorbed;
    dmgAfterBlock -= absorbed;
    if (absorbed > 0) log.push(`${target.name} blocks ${absorbed}`);
  }

  target.hp = Math.max(0, target.hp - dmgAfterBlock);
  if (passResult.clearEvasion) target.hasEvasion = false;
  if (target.hp === 0){
    const death = onEnemyDeath(target, enemies);
    log.push(...death.log);
    if (death.revivedEnemy){
      enemies[idx] = death.revivedEnemy;
    } else {
      killed = { enemy: target, extraDmgToPlayer: death.extraDmgToPlayer, suppressXp: death.suppressXp };
      enemies[idx] = target;
    }
  } else {
    enemies[idx] = target;
  }

  return { newEnemies: enemies, killed, reflected: passResult.dmgReflectedToPlayer, log };
}

/* ---------- TURN LOOP ---------- */
function runEnemyTurn(state){
  const enemies = (state.arena.enemies || []).map(e => ({...e}));
  let totalDmgToPlayer = 0;
  const summons = [];
  const log = [];
  const effects = {
    drainMomentum: 0, drainInsight: 0,
    applyPoison: 0, antiHeal: false, lockAdvanced: false,
    confused: false, halveHp: false, stealAllMomentum: false,
    wipePlayerBuffs: false, increaseCooldowns: 0, resetStreak: false,
    healAlliesPct: 0, shieldAllies: 0, buffAlliesDmg: 0,
    forceTargetId: null, ultimatumCheck: false,
  };

  for (let i = 0; i < enemies.length; i++){
    const e = enemies[i];
    if (e.hp <= 0) continue;
    const r = resolveEnemyAction(e, state, enemies);
    enemies[i] = r.enemy;
    if (r.selfDestructed) enemies[i].hp = 0;
    totalDmgToPlayer += r.dmgToPlayer;
    log.push(...r.log);
    if (r.summons.length) summons.push(...r.summons);
    Object.keys(r.effects).forEach(k => {
      const v = r.effects[k];
      if (typeof v === 'boolean') effects[k] = effects[k] || v;
      else if (typeof v === 'number') effects[k] = (effects[k] || 0) + v;
      else effects[k] = v;
    });
  }

  if (effects.shieldAllies > 0){
    enemies.forEach(e => { if (e.hp > 0) e.block = (e.block || 0) + effects.shieldAllies; });
    log.push(`Allies shielded (+${effects.shieldAllies})`);
  }
  if (effects.buffAlliesDmg > 0){
    enemies.forEach(e => { if (e.hp > 0) e.enrageBonus = (e.enrageBonus || 0) + effects.buffAlliesDmg; });
    log.push(`Allies enraged (+${effects.buffAlliesDmg} dmg permanently)`);
  }
  if (effects.healAlliesPct > 0){
    const heal = Math.floor(totalDmgToPlayer * effects.healAlliesPct);
    enemies.forEach(e => { if (e.hp > 0) e.hp = Math.min(e.maxHp, e.hp + heal); });
    if (heal > 0) log.push(`Allies healed +${heal} HP each (vampiric)`);
  }

  return { newEnemies: enemies.concat(summons), totalDmgToPlayer, summons, effects, log };
}

/* ---------- UI: Multi-enemy HUD ---------- */
function MultiEnemyHUD({ state, setState, intentVisible }){
  const enemies = (state.arena && state.arena.enemies) || [];
  const targetIdx = (state.arena && state.arena.targetIndex) || 0;
  if (!enemies.length) return null;

  return (
    <div className="multi-enemy-hud">
      {enemies.map((e, i) => {
        if (e.hp <= 0) return null;
        const isTarget = i === targetIdx;
        const ability = (typeof ENEMY_ABILITIES !== 'undefined') ? ENEMY_ABILITIES[e.pattern[e.patternIndex % e.pattern.length]] : null;
        return (
          <div
            key={e.id}
            className={'enemy-card'+(isTarget?' targeted':'')}
            onClick={()=> setTarget(state, setState, i)}
            title={(e.passives || []).map(p => (typeof ENEMY_PASSIVES !== 'undefined' ? ENEMY_PASSIVES[p]?.name : p)).filter(Boolean).join(' · ')}
          >
            <div className="enemy-emoji">{e.emoji}</div>
            <div className="enemy-name">{e.name}</div>
            <div className="enemy-hp-bar">
              <div className="enemy-hp-fill" style={{ width: ((e.hp / e.maxHp) * 100) + '%' }}/>
            </div>
            <div className="tiny">{e.hp} / {e.maxHp}{e.block > 0 ? ' · 🛡 ' + e.block : ''}</div>
            {intentVisible && ability && (
              <div className={'enemy-intent intent-'+(ability.intent||'light_dmg')}>
                <span>{ability.icon}</span> <span className="tiny">{ability.name}</span>
              </div>
            )}
            {(e.passives || []).length > 0 && (
              <div className="enemy-passive-row">
                {(e.passives||[]).map(p => (
                  <span key={p} className="enemy-passive-icon" title={typeof ENEMY_PASSIVES !== 'undefined' ? ENEMY_PASSIVES[p]?.desc : p}>●</span>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- POISON / STATUS APPLICATION ---------- */
function applyEndOfPlayerTurnEffects(state, setState, hooks){
  const eff = (state.arena && state.arena.statusEffects) || defaultStatusEffects();
  let log = [];
  let dmgToPlayer = 0;

  if (eff.poisonStacks > 0){
    const augBonus = (typeof getAugmentBonuses === 'function') ? getAugmentBonuses(state) : { immunePoison:false };
    if (!augBonus.immunePoison){
      dmgToPlayer += eff.poisonDmgPerTurn;
      log.push(`Poison ticks for ${eff.poisonDmgPerTurn} damage`);
    }
    const next = {...eff, poisonStacks: eff.poisonStacks - 1};
    setState({...state, arena:{...state.arena, statusEffects: next}});
  }

  return { dmgToPlayer, log };
}

/* ---------- CRAM WAVE V2 ---------- */
function generateCramWaveV2(mod, waveIndex){
  const lvl = 1 + Math.floor(waveIndex / 2);
  let count, tier;
  if (waveIndex < 3)      { count = 1 + Math.floor(waveIndex/2); tier = 'minion'; }
  else if (waveIndex < 6) { count = 2; tier = Math.random() < 0.3 ? 'elite' : 'minion'; }
  else if (waveIndex < 9) { count = 3; tier = Math.random() < 0.5 ? 'elite' : 'minion'; }
  else                    { count = 3; tier = 'elite'; }

  const enemies = [];
  for (let i = 0; i < count; i++){
    const isElite = tier === 'elite' || (tier !== 'minion' && Math.random() < 0.3);
    const t = isElite ? 'elite' : 'minion';
    enemies.push(generateEnemy(
      t === 'minion' ? `Cram Minion ${i+1}` : `Stress Specter`,
      t, lvl
    ));
  }
  return enemies.map(e => applySpawnTimePassives(e, enemies));
}


/* ============ CRAM MODE — REWORKED ============ *
 * "The Night Before" — wave survival with ability drafting.
 *
 * Flow:
 *   1. Pick a module → CramHub → "Begin Draft"
 *   2. CramDraftView — pick 3 abilities to start with (from your unlocked tree
 *      skills, or basic pool if you have fewer than 3 unlocked).
 *   3. Hotbar is set to those 3 (+ weapon basic). No augment swaps mid-run.
 *   4. Fight wave 1. On wave clear, the next wave spawns automatically.
 *   5. Every 3 waves cleared → study break: pick 1 of 3 NEW tree abilities to add.
 *   6. Boss spawns at wave 10 OR when 10 minutes elapse — whichever is first.
 *      No early-skip button. Beat it for run reward.
 *
 * Splice order: cram.jsx is BEFORE arena_runtime.jsx; raids.jsx is AFTER. */

const CRAM_DURATION_MS = 10 * 60 * 1000;
const CRAM_HP_MULT     = 0.5;
const CRAM_XP_MULT     = 4.0;          // bumped 3 → 4
const CRAM_BREAK_EVERY = 3;            // study break every N waves cleared
const CRAM_BOSS_WAVE   = 10;           // boss spawns when waveIndex hits this
const CRAM_LEGENDARY_AUGMENTS = ['capacitor_404','proctor_lens','god_mode_exe','silver_bullet','overflowing_chalice'];

function defaultCramState(){
  return {
    active:false, startedAt:null, durationMs:CRAM_DURATION_MS,
    waveIndex:0, killCount:0, studyBreaksRemaining:0,
    studyBreakOpen:false, bossPhase:false, moduleId:null,
    bestKills:0, bestWaves:0,
    draftedAbilities:[],   // ability IDs drafted at run start + study break unlocks
    runMistakeIds:[],      // questions missed THIS run (used by boss pool)
  };
}

function cramRemainingMs(cram){
  if (!cram || !cram.active || !cram.startedAt) return 0;
  if (cram.bossPhase) return 0;
  const elapsed = Date.now() - cram.startedAt;
  return Math.max(0, cram.durationMs - elapsed);
}

function fmtCramTimer(ms){
  const total = Math.ceil(ms/1000);
  const m = Math.floor(total/60), s = total % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

/* ---------- WAVE GENERATION ---------- */
/* `generateCramWaveV2` lives in multimob.jsx and pulls from enemies.jsx ability
 * pools. Use it as the canonical wave generator. This file's `generateCramWave`
 * is a fallback for when multimob isn't loaded. */
function generateCramWave(mod, waveIndex){
  if (typeof generateCramWaveV2 === 'function') return generateCramWaveV2(mod, waveIndex);
  const tier = waveIndex < 3 ? 'minion' : (waveIndex < 6 ? 'elite_lite' : 'elite');
  const count = waveIndex < 2 ? 1 : (waveIndex < 5 ? 2 : 3);
  const baseHp = tier === 'minion' ? 25 : tier === 'elite_lite' ? 45 : 70;
  const baseDmg = tier === 'minion' ? 5 : tier === 'elite_lite' ? 8 : 12;
  const enemies = [];
  for (let i = 0; i < count; i++){
    enemies.push({
      id: 'cram_w'+waveIndex+'_e'+i+'_'+Date.now(),
      name: tier === 'minion' ? 'Cram Minion' : tier === 'elite_lite' ? 'Stress Specter' : 'Burnout Beast',
      emoji: tier === 'minion' ? '👾' : tier === 'elite_lite' ? '😨' : '🔥',
      type: tier, tier: tier,
      hp: baseHp + waveIndex*3, maxHp: baseHp + waveIndex*3,
      dmg: { light: baseDmg, heavy: baseDmg * 2 },
      pattern: ['light','light','heavy'],
    });
  }
  return enemies;
}

/* ---------- DRAFT POOL ---------- */
/* What can you draft at run start?
 *   - All your unlocked tree abilities
 *   - If you have fewer than 3 unlocked, fall back to a basic tree pool */
function getCramDraftPool(state){
  const owned = (state.arena && state.arena.unlockedSkills) || [];
  const ownedAbs = owned
    .map(id => (typeof ABILITIES !== 'undefined') ? ABILITIES[id] : null)
    .filter(Boolean);
  if (ownedAbs.length >= 3) return ownedAbs;
  // Top-up from any tree-source ability the player hasn't seen
  const treeAll = (typeof ABILITIES !== 'undefined')
    ? Object.values(ABILITIES).filter(a => a.source === 'tree' && !owned.includes(a.id))
    : [];
  return [...ownedAbs, ...treeAll].slice(0, Math.max(6, ownedAbs.length + 6));
}

function pickStudyBreakOptions(state){
  const have = new Set([...((state.arena && state.arena.unlockedSkills) || []), ...((state.arena?.cram?.draftedAbilities) || [])]);
  const tree = (typeof ABILITIES !== 'undefined')
    ? Object.values(ABILITIES).filter(a => a.source === 'tree' && !have.has(a.id))
    : [];
  const a = tree.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a.slice(0, 3);
}

/* ---------- LIFECYCLE ---------- */
function startCram(state, setState, moduleId, draftedAbilities){
  const cram = {
    ...defaultCramState(),
    active: true,
    startedAt: Date.now(),
    durationMs: CRAM_DURATION_MS,
    waveIndex: 0, killCount: 0, studyBreaksRemaining: 0,
    studyBreakOpen: false, bossPhase: false, moduleId,
    draftedAbilities: draftedAbilities || [],
    runMistakeIds: [],
  };
  setState(s => ({...s, arena:{...s.arena, cram}}));
}

function endCram(state, setState, outcome){
  const cram = state.arena && state.arena.cram;
  if (!cram) return;
  const next = {
    ...defaultCramState(),
    bestKills: Math.max(cram.bestKills||0, cram.killCount||0),
    bestWaves: Math.max(cram.bestWaves||0, cram.waveIndex||0),
  };
  setState({...state, arena:{...state.arena, cram:next}});
}

/* ---------- COMBAT HOOKS (called from combat.jsx) ---------- */
/* Should the next wave be the boss? Boss spawns when wave hits the cap OR the
 * timer expires — whichever comes first. */
function cramShouldSpawnBoss(cram){
  if (!cram || !cram.active) return false;
  if (cram.bossPhase) return false;
  if ((cram.waveIndex || 0) >= CRAM_BOSS_WAVE) return true;
  if (cramRemainingMs(cram) <= 0) return true;
  return false;
}

function buildCramBoss(mod, level){
  const lvl = Math.max(1, level || 1);
  return {
    id: 'cram_boss_' + (mod?.id || 'x') + '_' + Date.now(),
    name: 'The Final Cram', emoji: '👹',
    tier: 'boss', type: 'boss',
    hp: 220 + lvl * 18, maxHp: 220 + lvl * 18,
    dmg: { light: 12 + lvl, heavy: 22 + lvl * 2 },
    pattern: ['heavy','light','heavy','light','heavy','light','heavy'],
    raidPhase: null,
  };
}

/* Cram boss question pool: 70% from arena.mistakePool + cram.runMistakeIds,
 * 30% from current module's exam-template-flavoured pool. If too few mistakes
 * to fill, fall back to module pool. */
function cramBossQuestions(mod, state, count){
  const want = count || 30;
  const lifetimeMistakes = (state.arena?.mistakePool || []);
  const runMistakes = (state.arena?.cram?.runMistakeIds || []);
  const allMistakes = Array.from(new Set([...runMistakes, ...lifetimeMistakes]));
  const allModQ = (mod?.levels || []).flatMap(l => l.concepts.flatMap(c =>
    c.questions
      .filter(q => ['mcq','tf','define','code_output','code_fill'].includes(q.type) || q.choices)
      .map(q => ({...q, conceptId:c.id, conceptName:c.name, conceptNotes:c.notes, levelName:l.name}))
  ));
  const qById = new Map(allModQ.map(q => [q.id, q]));
  const mistakeQs = allMistakes.map(id => qById.get(id)).filter(Boolean);
  if (mistakeQs.length < 5){
    // Not enough mistake history — use exam pool 100%
    return shuffleCram(allModQ).slice(0, want);
  }
  const wantMistakes = Math.round(want * 0.7);
  const wantExam     = want - wantMistakes;
  const m = shuffleCram(mistakeQs).slice(0, wantMistakes);
  const usedIds = new Set(m.map(q => q.id));
  const e = shuffleCram(allModQ.filter(q => !usedIds.has(q.id))).slice(0, wantExam);
  return shuffleCram([...m, ...e]);
}

function shuffleCram(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Called by combat.jsx after a successful wave clear in cram mode. */
function onCramWaveCleared(state, setState){
  const cram = state.arena && state.arena.cram;
  if (!cram) return;
  const newWave = (cram.waveIndex || 0) + 1;
  const breaksEarned = (cram.studyBreaksRemaining || 0) + (newWave % CRAM_BREAK_EVERY === 0 ? 1 : 0);
  setState(s => ({
    ...s,
    arena: { ...s.arena, cram: {
      ...cram, waveIndex: newWave,
      studyBreaksRemaining: breaksEarned,
      studyBreakOpen: breaksEarned > (cram.studyBreaksRemaining || 0),
    } },
  }));
}

function onCramKill(state, setState, count){
  const cram = state.arena && state.arena.cram;
  if (!cram) return;
  const n = count || 1;
  setState(s => ({...s, arena:{...s.arena, cram:{...cram, killCount:(cram.killCount||0)+n}}}));
}

/* Track per-run wrong-answer IDs so the boss can punish them. */
function onCramMistake(state, setState, qId){
  if (!qId) return;
  const cram = state.arena && state.arena.cram;
  if (!cram) return;
  const cur = cram.runMistakeIds || [];
  if (cur.includes(qId)) return;
  setState(s => ({...s, arena:{...s.arena, cram:{...cram, runMistakeIds:[...cur, qId].slice(-30)}}}));
}

function consumeStudyBreak(state, setState, abilityId){
  const cram = state.arena && state.arena.cram;
  if (!cram) return;
  const drafted = cram.draftedAbilities || [];
  setState(s => ({
    ...s,
    arena: { ...s.arena,
      cram: {
        ...cram,
        draftedAbilities: drafted.includes(abilityId) ? drafted : [...drafted, abilityId],
        studyBreaksRemaining: Math.max(0, (cram.studyBreaksRemaining || 0) - 1),
        studyBreakOpen: false,
      },
    },
  }));
}

function CramTimerStrip({ cram }){
  const [, setNow] = useState(Date.now());
  useEffect(()=>{
    if (!cram || !cram.active || cram.bossPhase) return;
    const i = setInterval(()=> setNow(Date.now()), 250);
    return ()=> clearInterval(i);
  }, [cram?.active, cram?.bossPhase]);
  const remaining = cramRemainingMs(cram);
  const isUrgent = remaining < 60_000 && !cram?.bossPhase;
  const waveProgress = Math.min(100, ((cram?.waveIndex || 0) / CRAM_BOSS_WAVE) * 100);
  return (
    <div className={'cram-timer-strip'+(isUrgent?' urgent':'')}>
      <span className="tiny">CRAM</span>
      <span className="cram-timer-clock">
        {cram?.bossPhase ? '👹 BOSS' : fmtCramTimer(remaining)}
      </span>
      <span className="chip">Wave {cram?.waveIndex || 0} / {CRAM_BOSS_WAVE}</span>
      <span className="chip">Kills {cram?.killCount || 0}</span>
      {cram?.studyBreaksRemaining > 0 && (
        <span className="chip ok">📚 {cram.studyBreaksRemaining} pick{cram.studyBreaksRemaining>1?'s':''} ready</span>
      )}
      {!cram?.bossPhase && (
        <div className="cram-progress-bar"><div className="cram-progress-fill" style={{width: waveProgress + '%'}}/></div>
      )}

  );
}

function awardCramVictory(state, setState, baseXp){
  const xp = Math.round((baseXp || 100) * 2);
  const eq = (state.inventory && state.inventory.equipment) || {};
  const ownedLegendaries = CRAM_LEGENDARY_AUGMENTS.filter(id => eq[id] && eq[id].quantity);
  const unowned = CRAM_LEGENDARY_AUGMENTS.filter(id => !ownedLegendaries.includes(id));
  let nextEquipment = {...eq};
  let droppedAugId = null;
  if (unowned.length > 0){
    droppedAugId = unowned[Math.floor(Math.random() * unowned.length)];
    nextEquipment[droppedAugId] = { id: droppedAugId, quantity: 1, discovered: true };
  } else if (CRAM_LEGENDARY_AUGMENTS.length){
    droppedAugId = CRAM_LEGENDARY_AUGMENTS[Math.floor(Math.random() * CRAM_LEGENDARY_AUGMENTS.length)];
    const cur = nextEquipment[droppedAugId] || { id: droppedAugId, quantity: 0, discovered: true };
    nextEquipment[droppedAugId] = { ...cur, quantity: (cur.quantity || 0) + 1, discovered: true };
  }
  setState({
    ...state,
    xp: (state.xp || 0) + xp,
    inventory: { ...(state.inventory||{}), equipment: nextEquipment },
    arena: { ...state.arena, cram: { ...defaultCramState(),
      bestKills: Math.max((state.arena.cram?.bestKills)||0, (state.arena.cram?.killCount)||0),
      bestWaves: Math.max((state.arena.cram?.bestWaves)||0, (state.arena.cram?.waveIndex)||0),
    }}
  });
  return { xpAwarded: xp, legendaryDropped: droppedAugId };
}

/* ============ STUDY PASS MODE ============ */
function StudyPassHub({ mod, state, onStart, onBack }){
  const [hoursLeft, setHoursLeft] = useState('24');
  const [targetPct, setTargetPct] = useState('50');
  const [prepLevel, setPrepLevel] = useState('cold');
  const [format, setFormat] = useState('mixed');

  const allConcepts = useMemo(() => (mod.levels || []).flatMap((lv, levelIndex) =>
    (lv.concepts || []).map((concept, conceptIndex) => ({
      ...concept,
      levelId:lv.id,
      levelName:lv.name,
      levelIndex,
      conceptIndex,
      questions:(concept.questions || []).map(q => ({
        ...q,
        conceptId:concept.id,
        conceptName:concept.name,
        conceptNotes:concept.notes,
        levelName:lv.name,
      })),
    }))
  ), [mod.id]);

  const allQ = useMemo(() => allConcepts.flatMap(c => c.questions), [allConcepts]);

  const typeMarks = useMemo(() => {
    const out = {};
    const comp = mod.examTemplate && Array.isArray(mod.examTemplate.composition) ? mod.examTemplate.composition : [];
    comp.forEach(part => {
      const count = Math.max(1, part.count || 1);
      out[part.type] = (out[part.type] || 0) + (part.marks || 1) * count;
    });
    return out;
  }, [mod.id]);

  const priorityRows = useMemo(() => {
    const mistakes = state?.arena?.mistakePool || [];
    const mistakeSet = new Set(mistakes);
    const dueAt = Date.now();
    const hours = Math.max(1, Number(hoursLeft) || 24);
    const urgency = hours <= 6 ? 1.35 : hours <= 24 ? 1.18 : 1;
    const coldBonus = prepLevel === 'cold' ? 2 : prepLevel === 'some' ? 1 : 0;
    return allConcepts.map(c => {
      const qCount = c.questions.length;
      const markValue = c.questions.reduce((sum, q) => sum + (typeMarks[q.type] || 1), 0);
      const due = c.questions.filter(q => state?.sr?.[q.id] && state.sr[q.id].due <= dueAt).length;
      const misses = c.questions.filter(q => mistakeSet.has(q.id)).length;
      const unseen = state?.seenConcepts?.[c.id] ? 0 : 1;
      const foundation = Math.max(0, 3 - c.levelIndex) * 0.8;
      const formatBoost = format === 'mixed' ? 0 : c.questions.filter(q => q.type === format).length * 2;
      const score = Math.round((markValue * 2.2 + misses * 9 + due * 4 + unseen * (4 + coldBonus) + foundation + formatBoost) * urgency);
      const minutes = Math.max(6, Math.min(18, 6 + Math.ceil(qCount * 1.6) + (misses ? 3 : 0)));
      return { concept:c, qCount, markValue, due, misses, unseen, score, minutes };
    }).sort((a,b) => b.score - a.score);
  }, [allConcepts, state?.arena?.mistakePool?.length, state?.sr, state?.seenConcepts, typeMarks, hoursLeft, prepLevel, format]);

  const topRows = priorityRows.slice(0, 6);
  const target = Math.max(40, Math.min(90, Number(targetPct) || 50));
  const estimatedStart = Math.max(18, Math.min(62, Math.round(28 + (state?.streak?.count || 0) * 0.8 + (allQ.length ? Math.min(18, allQ.filter(q => state?.sr?.[q.id]).length / allQ.length * 24) : 0))));
  const estimatedAfter = Math.min(75, estimatedStart + Math.round(topRows.reduce((sum, r) => sum + r.score, 0) / Math.max(12, topRows.length * 9)));
  const passGap = Math.max(0, target - estimatedStart);

  const selectFromRows = (rows, limit) => {
    const chosen = [];
    const used = new Set();
    rows.forEach(row => {
      const ordered = shuffle(row.concept.questions || []);
      ordered.forEach(q => {
        if (chosen.length >= limit || used.has(q.id)) return;
        chosen.push(q);
        used.add(q.id);
      });
    });
    if (chosen.length < limit){
      shuffle(allQ).forEach(q => {
        if (chosen.length >= limit || used.has(q.id)) return;
        chosen.push(q);
        used.add(q.id);
      });
    }
    return chosen;
  };

  const selectExamMix = (limit) => {
    const used = new Set();
    const selected = [];
    const comp = mod.examTemplate && Array.isArray(mod.examTemplate.composition) ? mod.examTemplate.composition : [];
    if (comp.length){
      comp.forEach(part => {
        const bucket = shuffle(allQ.filter(q => q.type === part.type && !used.has(q.id)));
        bucket.slice(0, part.count || 0).forEach(q => {
          if (selected.length >= limit) return;
          selected.push(q);
          used.add(q.id);
        });
      });
    }
    if (selected.length < limit){
      selectFromRows(priorityRows, limit).forEach(q => {
        if (selected.length >= limit || used.has(q.id)) return;
        selected.push(q);
        used.add(q.id);
      });
    }
    return selected;
  };

  const begin = (kind) => {
    if (!allQ.length){ alert('No questions in this module yet.'); return; }
    if (kind === 'diagnostic'){
      onStart({ questions:selectFromRows(topRows, Math.min(12, allQ.length)), title:`Pass Diagnostic - ${mod.name}`, mode:'study', durationMin:8 });
      return;
    }
    if (kind === 'mock'){
      onStart({ questions:selectExamMix(Math.min(40, allQ.length)), title:`Pass Mock - ${mod.name}`, mode:'exam', durationMin:Math.min(60, mod.examTemplate?.durationMin || 45) });
      return;
    }
    onStart({ questions:selectFromRows(topRows, Math.min(30, allQ.length)), title:`Pass Sprint - ${mod.name}`, mode:'study', durationMin:30 });
  };

  return (
    <div className="study-pass">
      <div className="study-pass-hero">
        <div>
          <div className="tiny pass-kicker">PASS MODE</div>
          <h2>Emergency prep — {mod.name}</h2>
          <div className="muted">Priority-first study for the next exam window.</div>
        </div>
        <div className="pass-odds">
          <div className="tiny">Estimated range</div>
          <b>{estimatedStart}% → {estimatedAfter}%</b>
          <span className={passGap ? 'chip warn' : 'chip ok'}>{passGap ? `${passGap}% gap` : 'on track'}</span>
        </div>
      </div>

      <div className="pass-layout">
        <section className="card pass-panel">
          <h3>Triage</h3>
          <div className="pass-form-grid">
            <label>
              <span className="tiny">Hours left</span>
              <input value={hoursLeft} onChange={e=>setHoursLeft(e.target.value)} inputMode="numeric" />
            </label>
            <label>
              <span className="tiny">Target %</span>
              <input value={targetPct} onChange={e=>setTargetPct(e.target.value)} inputMode="numeric" />
            </label>
            <label>
              <span className="tiny">Prep level</span>
              <select value={prepLevel} onChange={e=>setPrepLevel(e.target.value)}>
                <option value="cold">Cold start</option>
                <option value="some">Some notes</option>
                <option value="ready">Mostly ready</option>
              </select>
            </label>
            <label>
              <span className="tiny">Format focus</span>
              <select value={format} onChange={e=>setFormat(e.target.value)}>
                <option value="mixed">Mixed</option>
                <option value="mcq">MCQ</option>
                <option value="tf">True/False</option>
                <option value="define">Definitions</option>
                <option value="explain">Explain</option>
                <option value="short_essay">Short essays</option>
              </select>
            </label>
          </div>
          <div className="pass-action-row">
            <button className="btn" onClick={()=>begin('diagnostic')}>Start Diagnostic</button>
            <button className="btn ok" onClick={()=>begin('sprint')}>Start Pass Sprint</button>
            <button className="btn ghost" onClick={()=>begin('mock')}>Timed Mock</button>
          </div>
        </section>

        <section className="card pass-panel">
          <h3>Priority map</h3>
          <div className="pass-topic-list">
            {topRows.map((row, i) => (
              <div key={row.concept.id} className="pass-topic-row">
                <div className="pass-rank">{i+1}</div>
                <div>
                  <b>{row.concept.name}</b>
                  <div className="tiny">{row.concept.levelName} · {row.qCount} Q · {row.minutes} min</div>
                </div>
                <div className="pass-topic-flags">
                  {row.misses > 0 && <span className="chip err">{row.misses} miss</span>}
                  {row.due > 0 && <span className="chip warn">{row.due} due</span>}
                  {row.unseen > 0 && <span className="chip">new</span>}
                  <span className="chip accent">{row.score}</span>
                </div>
              </div>
            ))}
          </div>
        </section>
      </div>

      <div className="card pass-panel pass-coach">
        <h3>Next 30 minutes</h3>
        <div className="pass-steps">
          <div><b>1</b><span>Diagnostic snapshot</span></div>
          <div><b>2</b><span>Top two concepts</span></div>
          <div><b>3</b><span>Mixed retrieval</span></div>
          <div><b>4</b><span>Timed check</span></div>
        </div>
        <button className="btn ghost" onClick={onBack}>Back</button>
      </div>
    </div>
  );
}

function getRewardBonuses(rewards){
  const out = {};
  for (const r of (rewards || [])){
    if (r.type === 'stat'){
      out[r.stat] = (out[r.stat] || 0) + r.value;
    }
  }
  return out;
}

function rollRewardChoices(state){
  const exclude = new Set((state.unlockedRewards || []).filter(r => r.unique).map(r => r.id));
  const pool = REWARD_POOL.filter(r => !exclude.has(r.id));
  const weighted = [];
  for (const r of pool){ for (let i=0;i<(r.weight||1);i++) weighted.push(r); }
  const picks = [];
  while (picks.length < 3 && weighted.length){
    const idx = Math.floor(Math.random() * weighted.length);
    const choice = weighted[idx];
    if (!picks.find(p => p.id === choice.id)) picks.push(choice);
    // Remove all weighted entries of same id
    for (let i = weighted.length - 1; i >= 0; i--) if (weighted[i].id === choice.id) weighted.splice(i, 1);
  }
  return picks;
}

/* Apply reward bonuses on top of the stack-patched getCombinedStats (caveman patches first). */
const _gcs_pre_rewards = getCombinedStats;
getCombinedStats = function(state){
  const combined = _gcs_pre_rewards(state);
  const r = getRewardBonuses(state.unlockedRewards || []);
  combined.maxHpBonus       = (combined.maxHpBonus || 0)       + (r.maxHpBonus || 0);
  combined.flatDmg          = (combined.flatDmg || 0)          + (r.flatDmg || 0);
  combined.maxMomentumBonus = (combined.maxMomentumBonus || 0) + (r.maxMomentumBonus || 0);
  combined.insightCapBonus  = (combined.insightCapBonus || 0)  + (r.insightCapBonus || 0);
  combined.critChance       = (combined.critChance || 0)       + (r.critChance || 0);
  combined.xpBonus          = (combined.xpBonus || 0)          + (r.xpBonus || 0);
  combined.flatBlock        = (combined.flatBlock || 0)        + (r.flatBlock || 0);
  combined.flatHeal         = (combined.flatHeal || 0)         + (r.flatHeal || 0);
  return combined;
};

/* Lifetime stat buffs — additional layer on top of rewards. */
const _gcs_pre_stats = getCombinedStats;
getCombinedStats = function(state){
  const combined = _gcs_pre_stats(state);
  const sb = (typeof getStatBuffs === 'function') ? getStatBuffs(state.stats) : {};
  combined.maxHpBonus       = (combined.maxHpBonus || 0)       + (sb.maxHpBonus || 0);
  combined.flatDmg          = (combined.flatDmg || 0)          + (sb.flatDmg || 0);
  combined.maxMomentumBonus = (combined.maxMomentumBonus || 0) + (sb.maxMomentumBonus || 0);
  combined.insightCapBonus  = (combined.insightCapBonus || 0)  + (sb.insightCapBonus || 0);
  combined.critChance       = (combined.critChance || 0)       + (sb.critChance || 0);
  return combined;
};

/* ---------- FORGE ECONOMY ---------- */
const FORGE_SHARD_VALUE = { common:1, rare:3, epic:8, legendary:20, mythic:50, raid_only:30 };
const FORGE_CRAFT_COST = {
  common:    { shards:5,   insights:2 },
  rare:      { shards:15,  insights:5 },
  epic:      { shards:40,  insights:10 },
  legendary: { shards:100, insights:25 },
  mythic:    { shards:250, insights:50 },
};
const FORGE_UPGRADE_COST = [ // index = current upgradeLvl, cost to bump to next
  { mult:5  }, // 0→1
  { mult:15 }, // 1→2
  { mult:50 }, // 2→3 (cap)
];
const FORGE_UPGRADE_MAX = 3;

function forgeUpgradeCost(tier, currentLvl){
  if (currentLvl >= FORGE_UPGRADE_MAX) return null;
  const tierMult = FORGE_SHARD_VALUE[tier] || 1;
  return Math.round((FORGE_UPGRADE_COST[currentLvl]?.mult || 5) * tierMult);
}

function forgeShardAugment(state, augId){
  const inv = state.inventory || {};
  const eq = inv.equipment || {};
  const item = eq[augId];
  if (!item || (item.quantity || 0) <= 0) return state;
  const tier = LOOT_TABLE[augId]?.tier || 'common';
  const shards = FORGE_SHARD_VALUE[tier] || 1;
  const nextEq = { ...eq };
  if ((item.quantity || 0) <= 1){
    // Keep entry for codex (mark discovered) but quantity 0
    nextEq[augId] = { ...item, quantity: 0 };
  } else {
    nextEq[augId] = { ...item, quantity: item.quantity - 1 };
  }
  return { ...state, inventory: { ...inv, equipment: nextEq, shards: (inv.shards || 0) + shards } };
}

function forgeCraftAugment(state, tier){
  const cost = FORGE_CRAFT_COST[tier];
  if (!cost) return { state, item: null, error: 'Unknown tier' };
  const inv = state.inventory || {};
  if ((inv.shards || 0) < cost.shards) return { state, item: null, error: 'Not enough shards' };
  if ((state.insights || 0) < cost.insights) return { state, item: null, error: 'Not enough insights' };
  const pool = (LOOT_TIERS[tier]?.pool) || [];
  if (!pool.length) return { state, item: null, error: 'Empty pool' };
  const id = pool[Math.floor(Math.random() * pool.length)];
  const item = LOOT_TABLE[id];
  if (!item) return { state, item: null, error: 'Item not found' };
  const eq = inv.equipment || {};
  const cur = eq[id] || { id, quantity: 0, discovered: false };
  const nextEq = { ...eq, [id]: { ...cur, quantity: (cur.quantity || 0) + 1, discovered: true } };
  return {
    state: {
      ...state,
      insights: (state.insights || 0) - cost.insights,
      inventory: { ...inv, equipment: nextEq, shards: (inv.shards || 0) - cost.shards },
    },
    item,
    error: null,
  };
}

/* ---------- BESTIARY ---------- */
/* state.bestiary[enemyKey] = {
 *   name, emoji, tier, encounters, defeats, lastSeen,
 *   patterns: { [abilityId]: count },   // how often we saw each ability
 *   passives: [...passive ids ever seen],
 *   mistakes: [questionId, ...],        // last 10 wrong answers vs this enemy type
 * }
 */
function bestiaryKey(enemy){
  // Group by display name + tier so "Cram Minion" doesn't collide with "Stress Specter"
  return (enemy?.name || 'Unknown') + '|' + (enemy?.tier || enemy?.type || 'minion');
}

function recordBestiaryEncounter(state, enemiesArr){
  if (!enemiesArr || !enemiesArr.length) return state;
  const next = { ...(state.bestiary || {}) };
  for (const e of enemiesArr){
    const k = bestiaryKey(e);
    const cur = next[k] || { name: e.name, emoji: e.emoji, tier: e.tier || e.type, encounters: 0, defeats: 0, patterns: {}, passives: [], mistakes: [] };
    cur.encounters = (cur.encounters || 0) + 1;
    cur.lastSeen = Date.now();
    if (e.hp <= 0) cur.defeats = (cur.defeats || 0) + 1;
    // Record what abilities this enemy carried (the pattern array is what they cycle through)
    if (Array.isArray(e.pattern)){
      cur.patterns = { ...cur.patterns };
      for (const id of e.pattern) cur.patterns[id] = (cur.patterns[id] || 0) + 1;
    }
    if (Array.isArray(e.passives)){
      const set = new Set(cur.passives);
      for (const id of e.passives) set.add(id);
      cur.passives = Array.from(set);
    }
    next[k] = cur;
  }
  return { ...state, bestiary: next };
}

function recordBestiaryMistake(state, enemiesArr, questionId){
  if (!questionId || !enemiesArr || !enemiesArr.length) return state;
  const next = { ...(state.bestiary || {}) };
  const livingTargets = enemiesArr.filter(e => e.hp > 0);
  // Tag the mistake against any living enemy at the time of the wrong answer
  for (const e of livingTargets){
    const k = bestiaryKey(e);
    const cur = next[k] || { name: e.name, emoji: e.emoji, tier: e.tier || e.type, encounters: 0, defeats: 0, patterns: {}, passives: [], mistakes: [] };
    const list = (cur.mistakes || []).filter(id => id !== questionId);
    list.unshift(questionId);
    cur.mistakes = list.slice(0, 10);
    next[k] = cur;
  }
  return { ...state, bestiary: next };
}

function applyExchangeOffer(state, offerId){
  const offer = EXCHANGE_OFFERS.find(o => o.id === offerId);
  if (!offer) return { state, error: 'Unknown offer' };
  if (!offer.canApply(state)) return { state, error: 'Cannot apply (requirements unmet)' };
  // 1% data-corruption chance
  if (Math.random() < 0.01){
    return { state: { ...state, exchangeHistory: [...(state.exchangeHistory||[]), { offerId, at: Date.now(), corrupted: true }] }, corrupted: true };
  }
  let next = offer.apply(state);
  next = { ...next, exchangeHistory: [...(next.exchangeHistory||[]), { offerId, at: Date.now() }] };
  return { state: next, error: null };
}

function forgeUpgradeAugment(state, augId){
  const inv = state.inventory || {};
  const eq = inv.equipment || {};
  const item = eq[augId];
  if (!item) return { state, error: 'Not owned' };
  const curLvl = item.upgradeLvl || 0;
  if (curLvl >= FORGE_UPGRADE_MAX) return { state, error: 'Max upgrade' };
  const tier = LOOT_TABLE[augId]?.tier || 'common';
  const cost = forgeUpgradeCost(tier, curLvl);
  if ((inv.shards || 0) < cost) return { state, error: 'Not enough shards' };
  return {
    state: {
      ...state,
      inventory: {
        ...inv,
        shards: (inv.shards || 0) - cost,
        equipment: { ...eq, [augId]: { ...item, upgradeLvl: curLvl + 1 } },
      },
    },
    error: null,
  };
}

function weaponList(){
  return Object.values(WEAPONS).filter(w => w && typeof w === 'object' && w.id);

function getWeaponDef(id){
  return WEAPONS[id] || weaponList().find(w => w.id === id) || WEAPONS.blade || weaponList()[0];
}

function weaponAbilityIds(weapon){
  if (!weapon) return [];
  return [weapon.basic, ...((weapon.abilities || []))].filter(Boolean);
}

if (!WEAPONS.find){
  Object.defineProperties(WEAPONS, {
    find: { value: cb => weaponList().find(cb), enumerable:false },
    map: { value: cb => weaponList().map(cb), enumerable:false },
    filter: { value: cb => weaponList().filter(cb), enumerable:false },
    0: { get(){ return weaponList()[0]; }, enumerable:false },
  });
}

function biomeModifierChips(biome){
  if (!biome) return [];
  const chips = [];
  if (biome.skillCooldownReduce)   chips.push({ label:'Skills -' + biome.skillCooldownReduce + ' CD', tone:'good' });
  if (biome.dotDamage)             chips.push({ label:'DOT ' + biome.dotDamage + '/turn',              tone:'bad' });
  if (biome.bossHpMult && biome.bossHpMult !== 1) chips.push({ label:'Boss HP ' + (biome.bossHpMult > 1 ? '+' : '') + Math.round((biome.bossHpMult - 1) * 100) + '%', tone: biome.bossHpMult > 1 ? 'bad' : 'good' });

  if (biome.momentumBoost)         chips.push({ label:'+' + biome.momentumBoost + ' momentum/turn',     tone:'good' });
  if (biome.xpBonus)               chips.push({ label:'+' + Math.round(biome.xpBonus * 100) + '% XP',   tone:'good' });
  if (biome.lootBonus)             chips.push({ label:'+' + Math.round(biome.lootBonus * 100) + '% loot', tone:'good' });

function dropLoot(raidType, biome){
  const drops = [];
  if (raidType && RELIC_MAP[raidType]){
    const relic = LOOT_TABLE[RELIC_MAP[raidType]];
    if (relic) drops.push({ item:relic, quantity:1 });
  }
  if (!raidType){
    const roll = Math.random();
    const tier = roll < 0.01 ? 'mythic' : roll < 0.07 ? 'legendary' : roll < 0.25 ? 'epic' : roll < 0.50 ? 'rare' : 'common';
    const cfg = LOOT_TIERS[tier];
    if (cfg && cfg.pool.length){
      const item = LOOT_TABLE[cfg.pool[Math.floor(Math.random() * cfg.pool.length)]];
      if (item) drops.push({ item, quantity:1 });
    }
  }
  if (biome?.lootTable?.length){
    const item = LOOT_TABLE[biome.lootTable[Math.floor(Math.random() * biome.lootTable.length)]];
    if (item) drops.push({ item, quantity:1 });
  }
  return drops;
}

function addDropsToInventory(state, drops){
  if (!drops || !drops.length) return state.inventory || {};
  const inv = state.inventory || {};
  const equipment = { ...(inv.equipment || {}) };
  for (const d of drops){
    if (!d.item) continue;
    const cur = equipment[d.item.id] || { id:d.item.id, quantity:0, discovered:false };
    equipment[d.item.id] = { ...cur, quantity:(cur.quantity || 0) + (d.quantity || 1), discovered:true };
  }
  return { ...inv, equipment };
}

  return sockets.find(a => a && LOOT_TABLE[a]?.effect?.slot === 'weapon' && LOOT_TABLE[a]?.effect?.[key] != null)?.effect?.[key];
}

function getWeaponProgress(arena, weaponId){
  const p = (arena.weapons || {})[weaponId] || {};
  return { level:Math.max(1, p.level || 1), xp:Math.max(0, p.xp || 0), unlocked:p.unlocked !== false };
}

function weaponXpNeeded(level){
  return Math.max(100, (level || 1) * 100);
}

function gainWeaponXp(arena, weaponId, amount){
  const current = getWeaponProgress(arena, weaponId);
  let xp = current.xp + Math.max(0, amount || 0);
  let level = current.level;
  let leveled = 0;
  while (xp >= weaponXpNeeded(level)){
    xp -= weaponXpNeeded(level);
    level += 1;
    leveled += 1;
  }
  const weapons = { ...(arena.weapons || {}), [weaponId]:{ ...current, unlocked:true, xp, level } };
  return { arena:{ ...arena, weapons }, leveled, level, xp };
}

function totalSP(state){
  return Math.floor((state.xp || 0) / 50);
}

function availableSP(state, arena){
  return totalSP(state) - (arena.spSpent || 0);
}

function moduleSkill(state, mod){
  const sr = state.sr || {};
  let mastered = 0;
  for (const lv of mod.levels){
    for (const c of lv.concepts){
      if (c.questions.some(q => (sr[q.id] || {}).interval >= 7)) mastered++;
    }
  }
  const total = mod.levels.reduce((a, lv) => a + lv.concepts.length, 0);
  return { level:Math.min(10, Math.floor(mastered / 2)), mastered, total };
}

  ];

function arenaQuestions(mod, n, levelId, conceptFilter){
  const fast = new Set(['mcq','tf','define','code_output','code_fill']);
  const allowConcept = conceptFilter && conceptFilter.length ? new Set(conceptFilter) : null;
  const levels = levelId ? mod.levels.filter(l => l.id === levelId) : mod.levels;
  const all = levels.flatMap(l => l.concepts.flatMap(c => {
    if (allowConcept && !allowConcept.has(c.id)) return [];
    return c.questions
      .filter(q => fast.has(q.type) || q.choices)
      .map(q => ({ ...q, conceptId:c.id, conceptName:c.name, conceptNotes:c.notes, levelName:l.name }));
  }));
  return shuffle(all).slice(0, n || 50);
}

function getAbilityDesc(a, weaponLevel){
  if (!a) return '';
  return a.getDesc ? a.getDesc(weaponLevel || 1) : (a.desc || '');
}

function defaultRaidProgress(){
  return { activeRaidId: null, phaseIdx: 0, completed: {}, runs: 0 };
}

function buildRaidBoss(raidDef, phaseKey, mod, skill){
  const ph = raidDef.phases[phaseKey];
  const lvl = Math.max(1, skill?.level || 1);
  const baseHp = 80 + lvl * 14;
  const hp = Math.round(baseHp * (ph.hpMul || 1));
  return {
    id: raidDef.id + '_' + phaseKey,
    name: ph.name + ' · ' + raidDef.name,
    emoji: ph.icon,
    hp,
    dmg: { light: Math.round((8 + lvl) * (ph.dmgMul || 1)), heavy: Math.round((14 + lvl * 2) * (ph.dmgMul || 1)) },
    pattern: ['light','heavy','light','heavy','heavy'],
    levelId: null,
    raidPhase: phaseKey,
    raidId: raidDef.id,
    raidPhaseMods: { dotPerTurn: ph.dotPerTurn || 0, addCount: ph.addCount || 0 },
  };
}

  return (
    <div>
      <h2>⚡ Raids</h2>
      <div className="muted" style={{marginBottom:14}}>Four phases per raid: Setup → Pressure → Burn → Death. Clear all four to drop the boss's relic and a bonus Mythic augment. Lose any phase, the run ends.</div>
      <div className="raid-hub-grid">
        {Object.values(RAID_DEFS).map(rd => {
          const completed = !!progress.completed[rd.id];
          return (
            <div key={rd.id} className="card raid-card" style={{borderColor: rd.accent, boxShadow:'0 0 24px '+rd.accent+'33'}}>
              <div className="raid-card-head">
                <span className="raid-card-icon" style={{color:rd.accent}}>{rd.icon}</span>
                <div>
                  <h3 style={{marginBottom:4,color:rd.accent}}>{rd.name}</h3>
                  <div className="tiny">{rd.desc}</div>
                </div>
              </div>
              <div className="raid-phases-row">
                {RAID_PHASES.map((p,i)=>{
                  const ph = rd.phases[p];
                  const meta = RAID_PHASE_META[p];
                  return (
                    <div key={p} className="raid-phase-pip" title={meta.desc}>
                      <span className="raid-phase-pip-num">{meta.icon}</span>
                      <span className="tiny">{meta.name}</span>
                      <span className="raid-phase-pip-stats">HP×{ph.hpMul} · DMG×{ph.dmgMul}{ph.dotPerTurn?' · DOT '+ph.dotPerTurn:''}{ph.addCount?' · +'+ph.addCount+' adds':''}</span>

                })}

                <span>🏆 Reward: {LOOT_TABLE[rd.relicId]?.icon} {LOOT_TABLE[rd.relicId]?.name} + bonus Mythic</span>
