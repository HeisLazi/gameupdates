  /* ===== AUGMENT CODEX ===== */
  .codex-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:10px; max-height:520px; overflow-y:auto; padding-right:6px;
  }
  .codex-card{
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius); padding:12px;
    transition:all var(--t-fast); position:relative;
  }
  .codex-card.locked{opacity:0.55; filter:grayscale(0.65)}
  .codex-card.owned{background:linear-gradient(180deg, var(--panel2), var(--panel))}
  .codex-card:hover{transform:translateY(-2px); border-color:var(--line-2); box-shadow:0 4px 14px rgba(0,0,0,0.3)}
  .codex-card.tier-rare.owned     {border-color:rgba(59,130,246,0.40)}
  .codex-card.tier-epic.owned     {border-color:rgba(168,85,247,0.45)}
  .codex-card.tier-legendary.owned{border-color:rgba(255,215,0,0.50); box-shadow:0 0 0 1px rgba(255,215,0,0.10)}
  .codex-card.tier-mythic.owned   {border-color:rgba(255,107,107,0.55); box-shadow:0 0 0 1px rgba(255,107,107,0.15), 0 0 14px rgba(255,107,107,0.10)}
  .codex-head{display:flex; gap:10px; align-items:flex-start; margin-bottom:8px}
  .codex-icon{
    font-size:30px; line-height:1; width:42px; height:42px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel3); border:1px solid var(--line);
    border-radius:var(--radius-sm); flex-shrink:0;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }
  .codex-meta{flex:1; min-width:0}
  .codex-name{font-weight:700; font-size:13.5px; color:var(--text); line-height:1.2; margin-bottom:4px}
  .codex-tier-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .codex-count{font:600 11px 'JetBrains Mono', monospace; color:var(--ok)}
  .codex-locked-tag{font-size:10px; color:var(--muted-2); font-weight:600}
  .codex-desc{font-size:12px; line-height:1.5; color:var(--text-2); margin-top:4px}

  /* ===== SOCKETS ===== */
  .socket-card{
    background:linear-gradient(135deg, rgba(139,158,255,0.08), rgba(167,139,250,0.04));
    border:1px solid var(--accent-line); margin-bottom:14px;
  }
  .socket-row{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:10px;
  }
  .socket-slot{
    background:var(--panel); border:2px dashed var(--line-2);
    border-radius:var(--radius); padding:12px 10px;
    min-height:110px; text-align:center;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    transition:all var(--t-fast); position:relative;
  }
  .socket-slot.filled{border-style:solid; background:var(--panel2)}
  .socket-slot.tier-rare.filled     {border-color:rgba(59,130,246,0.55)}
  .socket-slot.tier-epic.filled     {border-color:rgba(168,85,247,0.55)}
  .socket-slot.tier-legendary.filled{border-color:rgba(255,215,0,0.55); box-shadow:0 0 12px rgba(255,215,0,0.15)}
  .socket-slot.tier-mythic.filled   {border-color:rgba(255,107,107,0.55); box-shadow:0 0 14px rgba(255,107,107,0.18)}
  .socket-icon{font-size:24px; line-height:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))}
  .socket-name{font-weight:700; font-size:12.5px; color:var(--text)}
  .socket-desc{font-size:10.5px; line-height:1.35; padding:0 4px}
  .socket-remove{margin-top:6px; padding:3px 8px; font-size:10px}
  .socket-empty{display:flex; flex-direction:column; align-items:center; gap:2px; opacity:0.6}
  .aug-pick.tier-rare     {border:1px solid rgba(59,130,246,0.55)}
  .aug-pick.tier-epic     {border:1px solid rgba(168,85,247,0.55)}
  .aug-pick.tier-legendary{border:1px solid rgba(255,215,0,0.60); color:#0a0b10}
  .aug-pick.tier-mythic   {border:1px solid rgba(255,107,107,0.60)}

  /* ===== POST-FIGHT LOOT ===== */
  .result-banner.win h2{color:var(--ok); text-shadow:0 0 14px rgba(74,222,128,0.35)}
  .result-banner.lose h2{color:var(--err); text-shadow:0 0 14px rgba(248,113,113,0.35)}
  .loot-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:12px;
  }
  .loot-card{
    position:relative;
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius); padding:14px 12px;
    text-align:center; display:flex; flex-direction:column;
    align-items:center; gap:6px;
    animation:lootDropIn 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .loot-card.tier-common   {border-color:rgba(107,114,135,0.45)}
  .loot-card.tier-rare     {border-color:rgba(59,130,246,0.55); box-shadow:0 0 16px rgba(59,130,246,0.10)}
  .loot-card.tier-epic     {border-color:rgba(168,85,247,0.55); box-shadow:0 0 18px rgba(168,85,247,0.14)}
  .loot-card.tier-legendary{border-color:rgba(255,215,0,0.55); box-shadow:0 0 22px rgba(255,215,0,0.20); animation:lootDropIn 320ms cubic-bezier(0.34, 1.56, 0.64, 1), legendaryShine 2.5s ease-in-out infinite 320ms}
  .loot-card.tier-mythic   {border-color:rgba(255,107,107,0.60); box-shadow:0 0 28px rgba(255,107,107,0.25); animation:lootDropIn 320ms cubic-bezier(0.34, 1.56, 0.64, 1), mythicShine 2s ease-in-out infinite 320ms}
  .loot-card.new::before{
    content:''; position:absolute; inset:-1px;
    border-radius:var(--radius); pointer-events:none;
    background:linear-gradient(135deg, transparent 0%, rgba(139,158,255,0.20) 50%, transparent 100%);
    background-size:200% 200%;
    animation:newShimmer 1.6s ease-in-out infinite;
  }
  .loot-new-badge{
    position:absolute; top:-8px; right:-8px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#0a0b10; font:700 10px/1 'JetBrains Mono', monospace;
    padding:4px 8px; border-radius:99px;
    box-shadow:0 4px 14px rgba(139,158,255,0.45);
    letter-spacing:.06em;
    animation:badgePop 280ms ease-out 200ms both;
    z-index:1;
  }
  .loot-icon{font-size:36px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5))}
  .loot-name{font-weight:700; font-size:14px; color:var(--text); letter-spacing:-0.005em}
  .loot-desc{font-size:11.5px; color:var(--text-2); line-height:1.45; margin-top:2px}
  @keyframes lootDropIn{
    0%{opacity:0; transform:translateY(-12px) scale(0.85)}
    100%{opacity:1; transform:none}
  }
  @keyframes badgePop{
    0%{opacity:0; transform:scale(0.5) rotate(-12deg)}
    60%{transform:scale(1.15) rotate(4deg)}
    100%{opacity:1; transform:scale(1) rotate(0)}
  }
  @keyframes newShimmer{
    0%,100%{background-position:0% 50%}
    50%{background-position:100% 50%}
  }
  @keyframes legendaryShine{
    0%,100%{box-shadow:0 0 22px rgba(255,215,0,0.20)}
    50%{box-shadow:0 0 32px rgba(255,215,0,0.35)}
  }
  @keyframes mythicShine{
    0%,100%{box-shadow:0 0 28px rgba(255,107,107,0.25)}
    50%{box-shadow:0 0 40px rgba(255,107,107,0.45)}
  }

  /* ===== PET COMPANION (in combat) ===== */
  .pet-companion-strip{
    display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    padding:8px 12px; margin-bottom:12px;
    background:linear-gradient(135deg, rgba(110,231,183,0.10), transparent 70%);
    border:1px solid rgba(110,231,183,0.30); border-radius:var(--radius);
    box-shadow:inset 0 0 0 1px rgba(110,231,183,0.06);
  }
  .pet-comp-info{display:flex; gap:10px; align-items:center; flex:1; min-width:0}
  .pet-comp-icon{
    font-size:24px; line-height:1; width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel3); border:1px solid rgba(110,231,183,0.40);
    border-radius:50%;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.45));
    animation:petBob 3s ease-in-out infinite;
  }
  .pet-comp-name{font-weight:700; font-size:13px; color:#86efac}
  .pet-comp-desc{margin-top:2px; max-width:420px}
  .pet-comp-log{
    display:flex; flex-direction:column; gap:2px;
    border-left:1px dashed var(--line); padding-left:10px;
  }
  .pet-comp-log-line{
    color:var(--text-2); font-style:italic;
    animation:fadeIn 240ms ease-out;
  }
  @keyframes petBob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-3px)}
  }

  /* ===== PET SANCTUARY ===== */
  .pet-equipped-banner{
    background:linear-gradient(135deg, rgba(110,231,183,0.14), rgba(34,197,94,0.06));
    border:1px solid rgba(110,231,183,0.40); margin-bottom:14px;
  }
  .pet-banner-icon{
    font-size:32px; line-height:1; width:54px; height:54px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel3); border:2px solid rgba(110,231,183,0.55);
    border-radius:50%;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    animation:petBob 2.4s ease-in-out infinite;
  }
  .pet-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:12px;
  }
  .pet-card{
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius); padding:14px;
    text-align:center; transition:all var(--t-fast);
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .pet-card:hover{transform:translateY(-2px); border-color:var(--line-2); box-shadow:0 4px 14px rgba(0,0,0,0.3)}
  .pet-card.equipped{
    border-color:rgba(110,231,183,0.55);
    background:linear-gradient(180deg, rgba(110,231,183,0.10), var(--panel2));
    box-shadow:0 0 0 1px rgba(110,231,183,0.30), 0 0 20px rgba(110,231,183,0.15);
  }
  .pet-card.tier-rare     {border-color:rgba(59,130,246,0.40)}
  .pet-card.tier-epic     {border-color:rgba(168,85,247,0.45)}
  .pet-card.tier-legendary{border-color:rgba(255,215,0,0.55); box-shadow:0 0 14px rgba(255,215,0,0.10)}
  .pet-card-icon{font-size:42px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5)); margin-bottom:4px}
  .pet-card-name{font-weight:700; font-size:14.5px; color:var(--text); letter-spacing:-0.005em}
  .pet-card-desc{font-size:12px; line-height:1.5; color:var(--text-2); margin-top:4px}

  /* ===== RAIDS ===== */
  .raid-hub-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    gap:14px;
  }
  .raid-card{
    padding:16px; transition:all var(--t-base);
  }
  .raid-card:hover{transform:translateY(-2px)}
  .raid-card-head{display:flex; gap:14px; align-items:flex-start; margin-bottom:12px}
  .raid-card-icon{font-size:36px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5))}
  .raid-phases-row{
    display:grid; grid-template-columns:repeat(4, 1fr);
    gap:6px; margin-bottom:10px;
    padding:8px; background:var(--panel); border-radius:var(--radius-sm);
    border:1px solid var(--line);
  }
  .raid-phase-pip{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    text-align:center;
  }
  .raid-phase-pip-num{font-size:20px; line-height:1}
  .raid-phase-pip-stats{
    font:600 9.5px 'JetBrains Mono', monospace;
    color:var(--muted); letter-spacing:0;
    line-height:1.3;
  }
  .raid-card-rewards{
    padding-top:10px; border-top:1px solid var(--line);
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    color:var(--text-2);
  }

  .raid-phase-banner{
    margin-bottom:10px;
    padding:12px 14px;
  }
  .raid-phase-dot{
    display:inline-flex; align-items:center; justify-content:center;
    width:30px; height:30px; border-radius:50%;
    background:var(--panel3); border:1px solid var(--line);
    font-size:14px;
    transition:all var(--t-fast);
    opacity:0.4;
  }
  .raid-phase-dot.done{
    opacity:0.6; background:rgba(74,222,128,0.10);
    border-color:rgba(74,222,128,0.35);
  }
  .raid-phase-dot.active{
    opacity:1; background:var(--accent-soft);
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft), 0 0 12px var(--accent);
    animation:raidDotPulse 1.4s ease-in-out infinite;
  }
  @keyframes raidDotPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.1)}
  }
  .raid-rewards-row{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:12px; margin-top:14px;
  }

  /* ===== LEVEL-UP MODAL ===== */
  .levelup-overlay{
    position:fixed; inset:0; z-index:1000;
    background:rgba(10,11,16,0.85);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    animation:fadeIn 240ms ease-out;
  }
  .levelup-modal{
    background:linear-gradient(180deg, rgba(139,158,255,0.12), var(--panel));
    border:2px solid var(--accent);
    border-radius:var(--radius-lg);
    padding:28px;
    max-width:780px; width:100%;
    box-shadow:0 0 60px rgba(139,158,255,0.4), 0 0 0 1px var(--accent-line);
    animation:lootDropIn 360ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .levelup-header{text-align:center; margin-bottom:20px}
  .levelup-rank{
    display:inline-block;
    padding:5px 14px; border-radius:99px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#0a0b10;
    font:700 11px 'JetBrains Mono', monospace;
    letter-spacing:.12em;
    margin-bottom:8px;
    box-shadow:0 4px 14px rgba(139,158,255,0.45);
  }
  .levelup-header h2{font-size:26px; letter-spacing:-0.02em; margin-bottom:6px}
  .levelup-choices{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:12px;
  }
  @media(max-width:760px){.levelup-choices{grid-template-columns:1fr}}
  .levelup-choice{
    background:var(--panel2); border:2px solid var(--line-2);
    border-radius:var(--radius); padding:18px 14px;
    text-align:center; cursor:pointer; font:inherit; color:var(--text);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    transition:all var(--t-fast); position:relative;
    min-height:160px;
  }
  .levelup-choice:hover{
    transform:translateY(-3px) scale(1.02);
    border-color:var(--accent);
    box-shadow:0 8px 24px rgba(139,158,255,0.30);
  }
  .levelup-choice.tier-rare    {border-color:rgba(59,130,246,0.55)}
  .levelup-choice.tier-rare:hover{box-shadow:0 8px 24px rgba(59,130,246,0.30)}
  .levelup-choice-icon{font-size:42px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5))}
  .levelup-choice-name{font-weight:700; font-size:15px; color:var(--text); letter-spacing:-0.005em}
  .levelup-choice-desc{font-size:12px; line-height:1.45; color:var(--text-2)}

  /* ===== FORGE ===== */
  .forge-balance-card{
    background:linear-gradient(135deg, rgba(245,158,11,0.10), rgba(244,114,182,0.06));
    border:1px solid rgba(245,158,11,0.30);
    margin-bottom:14px;
  }
  .forge-stat-num{
    font:700 20px 'JetBrains Mono', monospace;
    color:var(--text);
  }
  .forge-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:12px;
  }
  .forge-card{
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius); padding:12px;
    transition:all var(--t-fast);
    display:flex; flex-direction:column; gap:6px;
  }
  .forge-card:hover{transform:translateY(-2px); border-color:var(--line-2)}
  .forge-card.tier-rare     {border-color:rgba(59,130,246,0.40)}
  .forge-card.tier-epic     {border-color:rgba(168,85,247,0.45)}
  .forge-card.tier-legendary{border-color:rgba(255,215,0,0.55); box-shadow:0 0 14px rgba(255,215,0,0.10)}
  .forge-card.tier-mythic   {border-color:rgba(255,107,107,0.55); box-shadow:0 0 14px rgba(255,107,107,0.15)}
  .forge-card-head{display:flex; gap:10px; align-items:center}
  .forge-card-icon{
    font-size:28px; line-height:1; width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel3); border:1px solid var(--line);
    border-radius:var(--radius-sm);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    flex-shrink:0;
  }
  .forge-card-name{font-weight:700; font-size:13px; color:var(--text); margin-bottom:2px}
  .forge-card-desc{line-height:1.4}
  .forge-upgrade-pips{
    display:flex; gap:3px; margin-left:auto;
  }
  .upgrade-pip{
    color:var(--muted-2); font-size:14px;
    transition:color var(--t-fast);
  }
  .upgrade-pip.filled{color:var(--accent); text-shadow:0 0 6px var(--accent)}
  .forge-craft-preview{padding:14px}
  .forge-craft-tier{margin-top:4px}

  /* ===== PASSIVES VIEW ===== */
  .passives-section{padding:14px 16px; margin-bottom:12px}
  .passives-grid{display:flex; flex-direction:column; gap:6px}
  .passives-row{
    display:flex; gap:10px; align-items:flex-start;
    padding:9px 10px; border-radius:var(--radius-sm);
    background:var(--panel2); border:1px solid var(--line);
    transition:all var(--t-fast);
  }
  .passives-row:hover{border-color:var(--line-2); background:var(--panel3)}
  .passives-row.tier-rare     {border-left:3px solid rgba(59,130,246,0.55)}
  .passives-row.tier-epic     {border-left:3px solid rgba(168,85,247,0.55)}
  .passives-row.tier-legendary{border-left:3px solid rgba(255,215,0,0.55)}
  .passives-row.tier-mythic   {border-left:3px solid rgba(255,107,107,0.60)}
  .passives-icon{
    font-size:22px; line-height:1; width:34px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }
  .passives-name{font-weight:700; font-size:13px; color:var(--text); letter-spacing:-0.005em}
  .passives-desc{margin-top:2px; line-height:1.45}

  /* ===== FORBIDDEN EXCHANGE v2 ===== */
  .exchange-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:12px;
  }
  .exchange-card{
    padding:14px;
    background:linear-gradient(180deg, rgba(248,113,113,0.06), var(--panel));
    border:1px solid rgba(248,113,113,0.30);
    transition:all var(--t-fast);
  }
  .exchange-card:hover:not(.disabled){
    transform:translateY(-2px);
    border-color:rgba(248,113,113,0.55);
    box-shadow:0 6px 20px rgba(248,113,113,0.15);
  }
  .exchange-card.disabled{opacity:0.55; filter:grayscale(0.4)}
  .exchange-card.confirming{
    border-color:var(--err);
    box-shadow:0 0 0 2px var(--err), 0 6px 24px rgba(248,113,113,0.30);
    animation:exchangePulse 1.2s ease-in-out infinite;
  }
  @keyframes exchangePulse{
    0%,100%{box-shadow:0 0 0 2px var(--err), 0 6px 24px rgba(248,113,113,0.30)}
    50%{box-shadow:0 0 0 3px var(--err), 0 8px 32px rgba(248,113,113,0.50)}
  }
  .exchange-card-head{display:flex; gap:10px; align-items:center; margin-bottom:10px}
  .exchange-icon{font-size:26px; line-height:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))}
  .exchange-trade{
    display:grid; grid-template-columns:1fr auto 1fr; gap:8px;
    align-items:center; margin-bottom:6px;
  }
  .exchange-trade-side{
    padding:8px 10px; border-radius:var(--radius-sm);
    background:var(--panel2); font-size:12px; line-height:1.4;
  }
  .exchange-trade-side.cost{
    border:1px solid rgba(248,113,113,0.25);
    background:linear-gradient(135deg, rgba(248,113,113,0.10), transparent 70%);
  }
  .exchange-trade-side.reward{
    border:1px solid rgba(74,222,128,0.25);
    background:linear-gradient(135deg, rgba(74,222,128,0.10), transparent 70%);
  }
  .exchange-arrow{font-size:18px; color:var(--muted); font-weight:700}

  /* ===== PET XP BARS (in PetSanctuary) ===== */
  .pet-xp-bar{
    width:100%; height:4px; border-radius:99px;
    background:rgba(255,255,255,0.06);
    overflow:hidden; margin-top:6px;
  }
  .pet-xp-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), var(--accent-2));
    transition:width var(--t-base);
    box-shadow:0 0 6px rgba(139,158,255,0.40);
  }
  .pet-xp-fill.max{
    background:linear-gradient(90deg, var(--ok), #fbbf24);
    box-shadow:0 0 8px rgba(251,191,36,0.50);
  }
  .pet-xp-tip{margin-top:3px; color:var(--muted); font-variant-numeric:tabular-nums; font-size:10.5px}
  .pet-level-chip{
    background:rgba(139,158,255,0.18);
    color:var(--accent);
    border:1px solid var(--accent-line);
    font-weight:700;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
  }

  /* ===== STATS BUFF PROGRESSION (in Stats view) ===== */
  .stat-buff-list{display:flex; flex-direction:column; gap:10px}
  .stat-buff-row{
    padding:10px 12px;
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
  }
  .stat-buff-head{display:flex; gap:10px; align-items:center}
  .stat-buff-icon{font-size:22px; line-height:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35))}
  .stat-buff-label{font-weight:700; font-size:13px; color:var(--text)}

  /* ===== BESTIARY ===== */
  .bestiary-grid{display:flex; flex-direction:column; gap:8px}
  .bestiary-card{
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius);
    transition:all var(--t-fast); overflow:hidden;
  }
  .bestiary-card:hover{border-color:var(--line-2)}
  .bestiary-card.open{border-color:var(--accent-line); background:linear-gradient(180deg, var(--panel2), var(--panel))}
  .bestiary-card.tier-elite     {border-left:3px solid rgba(168,85,247,0.55)}
  .bestiary-card.tier-boss      {border-left:3px solid rgba(255,107,107,0.65)}
  .bestiary-card.tier-minion    {border-left:3px solid rgba(107,114,135,0.45)}
  .bestiary-card-head{
    display:flex; gap:12px; align-items:center;
    padding:10px 14px;
    background:transparent; border:0; width:100%;
    cursor:pointer; color:var(--text); font:inherit;
    transition:background var(--t-fast);
  }
  .bestiary-card-head:hover{background:var(--panel3)}
  .bestiary-emoji{
    font-size:28px; line-height:1; width:42px; height:42px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel3); border:1px solid var(--line);
    border-radius:var(--radius-sm);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    flex-shrink:0;
  }
  .bestiary-name{font-weight:700; font-size:13.5px; color:var(--text); margin-bottom:3px}
  .bestiary-tier-row{display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .bestiary-toggle{font-size:14px; color:var(--muted); margin-left:6px}
  .bestiary-body{
    padding:12px 14px;
    border-top:1px solid var(--line);
    background:var(--panel);
    animation:fadeIn 200ms ease-out;
  }
  .bestiary-section{margin-bottom:12px}
  .bestiary-section:last-child{margin-bottom:0}
  .bestiary-mistakes{
    display:flex; flex-direction:column; gap:6px;
  }
  .bestiary-mistake-row{
    padding:8px 10px;
    background:rgba(248,113,113,0.06);
    border:1px solid rgba(248,113,113,0.20);
    border-left:3px solid var(--err);
    border-radius:var(--radius-sm);
  }
  .bestiary-mistake-q{font-size:12.5px; color:var(--text); line-height:1.4}

  /* ===== HUB TOOLBAR (compact arena nav) ===== */
  .hub-toolbar{
    display:flex; flex-wrap:wrap; gap:14px;
    margin-top:14px;
    padding:10px 12px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
  }
  .hub-toolbar-group{
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    padding:0 4px;
    border-right:1px solid var(--line);
  }
  .hub-toolbar-group:last-child{border-right:0}
  .hub-toolbar-label{
    font:700 10px 'JetBrains Mono', monospace;
    color:var(--muted-2);
    letter-spacing:.12em;
    margin-right:4px;
    padding-right:6px;
  }
  .hub-btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:var(--radius-sm);
    background:var(--panel2); border:1px solid var(--line);
    color:var(--text-2); cursor:pointer;
    font:600 12.5px 'Inter', sans-serif;
    transition:all var(--t-fast);
    white-space:nowrap;
  }
  .hub-btn:hover{
    background:var(--panel3); color:var(--text);
    border-color:var(--accent-line);
    transform:translateY(-1px);
  }
  .hub-btn.primary{
    background:linear-gradient(180deg, var(--accent), #7387f0);
    color:#0a0b10; border-color:var(--accent);
  }
  .hub-btn.primary:hover{filter:brightness(1.08); border-color:var(--accent)}
  .hub-btn.warn{
    border-color:rgba(248,113,113,0.30);
    color:#fca5a5;
  }
  .hub-btn.warn:hover{
    background:rgba(248,113,113,0.10);
    border-color:var(--err);
  }
  @media(max-width:760px){
    .hub-toolbar-group{border-right:0; padding-bottom:6px; border-bottom:1px solid var(--line)}
    .hub-toolbar-group:last-child{border-bottom:0; padding-bottom:0}
  }

  /* ===== COMBAT RESULT — overlay modal so you don't scroll ===== */
  .result-overlay{
    position:fixed; inset:0; z-index:900;
    background:rgba(10,11,16,0.78);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    animation:fadeIn 200ms ease-out;
    overflow-y:auto;
  }
  .result-modal{
    background:var(--panel); border:1px solid var(--line-2);
    border-radius:var(--radius-lg);
    padding:24px;
    max-width:780px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    animation:lootDropIn 360ms cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height:calc(100vh - 40px);
    overflow-y:auto;
  }
  .result-modal.win{
    border-color:rgba(74,222,128,0.45);
    box-shadow:0 0 60px rgba(74,222,128,0.20), 0 20px 60px rgba(0,0,0,0.6);
  }
  .result-modal.lose{
    border-color:rgba(248,113,113,0.45);
    box-shadow:0 0 60px rgba(248,113,113,0.18), 0 20px 60px rgba(0,0,0,0.6);
  }
  .result-banner{margin-bottom:14px}
  .result-banner.win h2{color:var(--ok); text-shadow:0 0 14px rgba(74,222,128,0.35)}
  .result-banner.lose h2{color:var(--err); text-shadow:0 0 14px rgba(248,113,113,0.35)}
  .result-loot{margin-bottom:14px}
  .result-empty{
    text-align:center; padding:18px;
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius); margin-bottom:14px;
  }
  .result-actions{
    padding-top:14px;
    border-top:1px solid var(--line);
    gap:8px;
  }

  /* ===== INTENT — color system + tooltip pill ===== */
  /* Tooltip-aware spans — hover shows the desc via title attr (Day 14 will replace
   * with a proper tooltip component for touch devices) */
  .intent{cursor:help; font-weight:600}
  .intent-heavy_dmg, .enemy-intent-pill.intent-heavy_dmg, .intent-legend-key.intent-heavy_dmg, .biome-mod-chip.intent-heavy_dmg{
    color:#fca5a5; background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.35);
  }
  .intent-light_dmg, .enemy-intent-pill.intent-light_dmg, .intent-legend-key.intent-light_dmg{
    color:#fdba74; background:rgba(249,115,22,0.12); border-color:rgba(249,115,22,0.35);
  }
  .intent-med_dmg, .enemy-intent-pill.intent-med_dmg, .intent-legend-key.intent-med_dmg{
    color:#fcd34d; background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.35);
  }
  .intent-fatal_dmg, .enemy-intent-pill.intent-fatal_dmg, .intent-legend-key.intent-fatal_dmg{
    color:#fca5a5; background:rgba(239,68,68,0.20); border-color:rgba(239,68,68,0.55);
    font-weight:700;
  }
  .intent-defend, .enemy-intent-pill.intent-defend, .intent-legend-key.intent-defend{
    color:#93c5fd; background:rgba(59,130,246,0.12); border-color:rgba(59,130,246,0.35);
  }
  .intent-debuff, .enemy-intent-pill.intent-debuff, .intent-legend-key.intent-debuff{
    color:#c4b5fd; background:rgba(168,85,247,0.12); border-color:rgba(168,85,247,0.35);
  }
  .intent-heal, .enemy-intent-pill.intent-heal, .intent-legend-key.intent-heal{
    color:#86efac; background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.35);
  }
  .intent-buff, .enemy-intent-pill.intent-buff, .intent-legend-key.intent-buff{
    color:#fde047; background:rgba(234,179,8,0.12); border-color:rgba(234,179,8,0.35);
  }
  .intent-summon, .enemy-intent-pill.intent-summon, .intent-legend-key.intent-summon{
    color:#fcd34d; background:rgba(234,179,8,0.16); border-color:rgba(234,179,8,0.40);
  }
  .intent-telegraph, .enemy-intent-pill.intent-telegraph, .intent-legend-key.intent-telegraph{
    color:#a8a29e; background:rgba(120,113,108,0.16); border-color:rgba(120,113,108,0.40);
    animation:telegraphPulse 1.4s ease-in-out infinite;
  }
  .intent-utility, .enemy-intent-pill.intent-utility, .intent-legend-key.intent-utility{
    color:#cbd5e1; background:rgba(100,116,139,0.14); border-color:rgba(100,116,139,0.36);
  }
  @keyframes telegraphPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}
    50%{box-shadow:0 0 0 2px rgba(168,162,158,0.30)}
  }

  .enemy-intent-pill{
    display:inline-block; margin-top:4px;
    padding:2px 8px; border-radius:99px;
    border:1px solid var(--line);
    font:600 10.5px 'Inter', sans-serif;
    cursor:help;
  }
  .intent-desc-line{
    margin-top:6px; padding:4px 8px;
    background:var(--panel3); border:1px solid var(--line);
    border-radius:var(--radius-sm);
    color:var(--text-2); font-style:italic;
    line-height:1.4; max-width:340px;
  }

  /* ===== INTENT LEGEND (combat — small key strip) ===== */
  .intent-legend{
    display:flex; flex-wrap:wrap; align-items:center;
    gap:6px; margin-bottom:10px;
    padding:6px 10px;
    background:var(--panel2); border:1px solid var(--line);
    border-radius:var(--radius-sm);
  }
  .intent-legend-label{
    font:700 10px 'JetBrains Mono', monospace;
    letter-spacing:.12em; color:var(--muted-2);
    margin-right:4px;
  }
  .intent-legend-key{
    display:inline-block;
    padding:2px 7px; border-radius:99px;
    font:600 10.5px 'Inter', sans-serif;
    border:1px solid var(--line);
    line-height:1.4;
  }

/* ===== Arena UX: hierarchy & decision clarity (scoped) =====
   - Primary focus: current question + chosen action (.combat-q + .action-card)
   - Secondary focus: current target enemy (.combat-side.boss / .enemies-grid .targeted)
   - Tertiary / de-emphasised: biome banner, logs, pet strip, non-target enemies
   - Visual emphasis is intentionally calm: selected action is clear but not flashy
*/
.arena-combat[data-arena] {
  --panel: #07090a;
  --panel2: #0f1314;
  --panel3: #141a1c;
  --line: rgba(255,255,255,0.06);
  --accent: #7dd87d;
  --accent-line: rgba(125,216,125,0.22);
  --muted-2: #5a635c;
}

/* Primary: question card */
.arena-combat[data-arena] .combat-q {
  border-left: 3px solid var(--accent);
  background: linear-gradient(180deg, rgba(255,255,255,0.015), transparent);
  padding: 16px;
  margin-top: 10px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.45);
  z-index: 30;
}
.arena-combat[data-arena] .q-prompt, .arena-combat[data-arena] .combat-q h3 {
  font-size: 20px;
  line-height: 1.26;
  color: var(--text);
}

/* Primary companion: action card + selected action (toned down) */
.arena-combat[data-arena] .action-card {
  margin-top: 10px;
  border-left: 3px solid var(--accent);
  padding: 12px;
  background: linear-gradient(180deg, rgba(125,216,125,0.02), transparent);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
  z-index: 25;
}

/* Slightly emphasize selected action without strong glow or motion */
.arena-combat[data-arena] .action-row .action-btn{
  transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
  opacity: 0.96;
}
.arena-combat[data-arena] .action-row .action-btn:not(.selected){
  opacity: 0.86;
  filter: none;
  box-shadow: none;
}
.arena-combat[data-arena] .action-row .action-btn.selected{
  opacity: 1;
  transform: translateY(-4px);
  border: 2px solid var(--accent);
  background: linear-gradient(180deg, rgba(125,216,125,0.06), rgba(125,216,125,0.02));
  box-shadow: 0 10px 20px rgba(0,0,0,0.45);
}
.arena-combat[data-arena] .action-row .action-btn.selected .action-icon{ font-size:26px; }

/* Secondary: target enemy */
.arena-combat[data-arena] .combat-hud .combat-side.boss{
  border-left: 2px solid var(--accent);
  background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
  padding: 10px;
  box-shadow: 0 8px 22px rgba(0,0,0,0.44);
}
.arena-combat[data-arena] .combat-hud .combat-side.boss .combat-name{
  font-size: 14px; font-weight:800; color:var(--text);
}
.arena-combat[data-arena] .combat-hud .combat-side.boss .hp-bar{ height:8px; border-radius:8px; }

/* Enemies grid: non-targets de-emphasized; targeted stands out */
.arena-combat[data-arena] .enemies-grid > *{ opacity: 0.68; transform:none; transition: all 180ms ease; }
.arena-combat[data-arena] .enemies-grid > *.targeted{ opacity:1; border-color:var(--accent); box-shadow: 0 12px 28px rgba(0,0,0,0.44); transform: translateY(-6px); }

/* Intent clarity */
.arena-combat[data-arena] .enemy-intent{ border-left-width:2px; padding:6px 8px; }
.arena-combat[data-arena] .enemy-intent .v{ font-weight:700; }

/* De-emphasize non-critical surfaces */
.arena-combat[data-arena] .biome-banner,
.arena-combat[data-arena] .pet-companion-strip,
.arena-combat[data-arena] .intent-legend,
.arena-combat[data-arena] .combat-feedback{
  opacity: 0.7;
  font-size: 12.5px;
  color: var(--muted-2);
  background: transparent;
  border-color: rgba(255,255,255,0.03);
}

.arena-combat[data-arena] .card { margin-bottom: 8px; padding: 10px; }

@media(max-width:900px){
  .arena-combat[data-arena] .q-prompt{ font-size:18px; }
  .arena-combat[data-arena] .action-row .action-btn.selected{ transform: none; box-shadow: 0 8px 18px rgba(0,0,0,0.42); }
  .arena-combat[data-arena] .combat-hud{ gap: 8px; padding: 10px; }
}

/* End scoped Arena UX */

/* ===== New cram split: Study Pass + Arena sprint surfaces ===== */
.study-pass,
.lockin-run{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.study-pass-hero,
.lockin-hero{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
  padding:16px;
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(125,216,125,0.06), rgba(255,255,255,0.01));
}
.pass-kicker,
.lockin-kicker{
  color:var(--accent);
  font-weight:800;
  letter-spacing:.16em;
}
.pass-odds{
  min-width:190px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
}
.pass-odds b{
  font:800 26px 'JetBrains Mono', monospace;
  color:var(--text);
}
.pass-layout{
  display:grid;
  grid-template-columns:minmax(280px, 390px) 1fr;
  gap:14px;
}
.pass-panel h3,
.lockin-panel h3{
  margin-top:0;
}
.pass-form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.pass-form-grid label{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.pass-form-grid input,
.pass-form-grid select{
  width:100%;
}
.pass-action-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}
.pass-topic-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.pass-topic-row{
  display:grid;
  grid-template-columns:34px 1fr auto;
  gap:10px;
  align-items:center;
  padding:10px;
  border:1px solid var(--line);
  background:var(--panel2);
}
.pass-topic-row:hover{
  border-color:var(--line-2);
  background:var(--panel3);
}
.pass-rank{
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--accent-line);
  color:var(--accent);
  font:800 12px 'JetBrains Mono', monospace;
  background:var(--accent-soft);
}
.pass-topic-flags{
  display:flex;
  justify-content:flex-end;
  flex-wrap:wrap;
  gap:4px;
}
.pass-coach{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.pass-steps{
  display:grid;
  grid-template-columns:repeat(4, minmax(120px, 1fr));
  gap:8px;
  flex:1;
}
.pass-steps div{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  border:1px solid var(--line);
  background:var(--panel2);
}
.pass-steps b{
  color:var(--accent);
  font:800 13px 'JetBrains Mono', monospace;
}
.lockin-panel{
  border-left:3px solid var(--warn);
}

.cram-timer-strip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border:1px solid rgba(248,113,113,0.28);
  background:linear-gradient(90deg, rgba(248,113,113,0.14), rgba(255,255,255,0.02));
  margin-bottom:10px;
}
.cram-timer-strip.urgent{
  border-color:rgba(248,113,113,0.75);
  box-shadow:0 0 0 1px rgba(248,113,113,0.16), 0 14px 32px rgba(248,113,113,0.08);
}
.cram-timer-clock{
  font:900 24px 'JetBrains Mono', monospace;
  color:var(--err);
  min-width:82px;
}
.cram-progress-bar{
  flex:1;
  min-width:120px;
  height:6px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.05);
  overflow:hidden;
}
.cram-progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--warn));
  transition:width 200ms ease;
}
.cram-draft-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
  gap:10px;
}
.cram-draft-card{
  position:relative;
  text-align:left;
  cursor:pointer;
  min-height:170px;
  border:1px solid var(--line);
  background:var(--panel2);
}
.cram-draft-card.picked{
  border-color:var(--accent);
  background:linear-gradient(180deg, var(--accent-soft), var(--panel2));
}
.cram-draft-card.passive{
  border-style:dashed;
}
.cram-draft-icon{
  font-size:30px;
  margin-bottom:8px;
}
.cram-draft-name{
  font-weight:800;
  margin-bottom:6px;
}
.cram-draft-desc{
  margin-top:8px;
}
.cram-draft-check{
  position:absolute;
  top:8px;
  right:8px;
  color:var(--accent);
  font:900 18px 'JetBrains Mono', monospace;
}
.cram-modal-overlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(0,0,0,0.62);
  backdrop-filter:blur(4px);
}
.cram-modal{
  max-width:780px;
  width:100%;
  padding:16px;
  border:1px solid var(--accent-line);
  background:var(--panel);
  box-shadow:0 24px 80px rgba(0,0,0,0.55);
}
.cram-pick-card{
  text-align:left;
  cursor:pointer;
}

@media(max-width:900px){
  .study-pass-hero,
  .lockin-hero,
  .pass-coach{
    flex-direction:column;
    align-items:stretch;
  }
  .pass-layout,
  .pass-form-grid,
  .pass-steps{
    grid-template-columns:1fr;
  }
  .pass-topic-row{
    grid-template-columns:30px 1fr;
  }
  .pass-topic-flags{
    grid-column:1 / -1;
    justify-content:flex-start;
  }
}

</style>
</head>

  { rank: 10, numeral: 'X', name: 'Omniscient',          color: '#ffffff' },
];

/* ---------- INSIGHTS HELPERS ---------- */
const INSIGHT_CAP_DAILY = 3;       // max insights from Library per day
const INSIGHT_SECONDS_PER = 300;   // 5 minutes of reading = 1 insight
const INSIGHT_MAX_BALANCE = 10;    // hard cap on total balance

function insightsToday(state){
  const dk = dayKey();
  const t = state.library || {};
  if (t.dayKey !== dk) return { dayKey:dk, secondsRead:0, insightsEarned:0 };
  return t;
}

function grantInsight(state, n){
  const cur = Math.min(INSIGHT_MAX_BALANCE, (state.insights||0) + n);
  return {...state, insights:cur};
}

/* ---------- SPLASH SCREEN ---------- */
function SplashScreen({ state, setState }){
  const lvl = levelFromXp(state.xp||0).level;
  const hasProgress = (state.xp||0) > 0 || (state.streak?.count||0) > 0;

  const choose = (mode)=>{
    setState({...state, appMode:mode});
  };

  return (
    <div className="splash">
      <div className="splash-bg"/>
      <div className="splash-card">
        <div className="splash-brand">
          <div className="splash-logo">
            <div className="splash-logo-inner"/>
          </div>
          <h1 className="splash-title">StudyBuddy</h1>
          <div className="splash-tagline">Learn deeply. Test honestly. Level up.</div>
        </div>

        {hasProgress && (
          <div className="splash-status">
            <span className="chip accent">Level {lvl}</span>
            <span className="chip">🔥 {state.streak.count} day streak</span>
            <span className="chip">{state.xp||0} XP</span>
            {state.insights>0 && <span className="chip ok">💡 {state.insights} insights</span>}
          </div>
        )}

        <div className="splash-modes">
          <button className="splash-mode normal" onClick={()=>choose('normal')}>
            <div className="splash-mode-icon">📚</div>
            <h3>Study Mode</h3>
            <div className="muted">The classic flow. Topics, study, exam, daily plan, deadlines, stats.</div>
            <div className="splash-mode-tags">
              <span className="chip">Notes-first</span>
              <span className="chip">Spaced rep</span>
              <span className="chip">Exam timer</span>
            </div>
          </button>
          <button className="splash-mode arena" onClick={()=>choose('arena')}>
            <div className="splash-mode-icon">⚔️</div>
            <h3>Arena Mode</h3>
            <div className="muted">Same questions, gamified. Pick a weapon, fight bosses, climb a skill tree.</div>
            <div className="splash-mode-tags">
              <span className="chip accent">Combat</span>
              <span className="chip accent">Loadouts</span>
              <span className="chip accent">Insights</span>
            </div>
          </button>
        </div>

        <div className="splash-foot">
          <div className="tiny">You can switch modes any time from the top bar.</div>
        </div>
      </div>
    </div>
  );
}

/* ---------- LIBRARY ---------- */
function LibraryView({ state, setState, mod }){
  const ALL_MODS = [...BUILTIN, ...((state.customModules)||[])];
  const [activeModuleId, setActiveModuleId] = useState(mod.id);
  const [activeConceptId, setActiveConceptId] = useState(null);
  const [tick, setTick] = useState(0); // forces re-render every second
  const [pdfs, setPdfs] = useState(state.libraryPdfs || []);
  const [pdfViewing, setPdfViewing] = useState(null);
  const [pdfFullscreen, setPdfFullscreen] = useState(false);
  const [pdfBlobUrls, setPdfBlobUrls] = useState({});
  const [showAllPdfs, setShowAllPdfs] = useState(false);
  const [showPrestigeModal, setShowPrestigeModal] = useState(false);
  const [selectedPerk, setSelectedPerk] = useState(state.prestigePerk || null);
  const [prestigeConfirm, setPrestigeConfirm] = useState(false);
  
  const intRef = useRef(null);
  const visRef = useRef(true);
  const pdfUrlsRef = useRef({});

  const pdfKey = (p)=>pdfEntryKey(p);
  const pdfSrc = (p)=>{
    const key = pdfKey(p);
    return (key && (pdfBlobUrls[key] || pdfUrlsRef.current[key])) || p?.dataUrl || '';
  };
  const isPdfFile = (file)=>!!file && (((file.type || '').toLowerCase().includes('pdf')) || /\.pdf$/i.test(file.name || ''));
  const makePdfEntry = (file, moduleId)=>({
    id:'pdf_'+Date.now()+'_'+Math.random().toString(36).slice(2),
    name:file.name,
    moduleId,
    addedAt:Date.now(),
    size:file.size || 0,
    type:file.type || 'application/pdf',
  });
  const registerPdfFiles = (files, moduleId)=>{
    const entries = [];
    const urls = {};
    Array.from(files || []).filter(isPdfFile).forEach(file=>{
      const entry = makePdfEntry(file, moduleId);
      const url = URL.createObjectURL(file);
      entries.push(entry);
      urls[entry.id] = url;
      savePdfBlob(entry.id, file, entry).catch(()=>{});
    });
    if (Object.keys(urls).length){
      pdfUrlsRef.current = {...pdfUrlsRef.current, ...urls};
      setPdfBlobUrls(prev=>({...prev, ...urls}));
    }
    return entries;
  };

  // Track focus / visibility
  useEffect(()=>{
    const onVis = ()=>{ visRef.current = document.visibilityState === 'visible' && document.hasFocus(); };
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('focus', onVis);
    window.addEventListener('blur', onVis);
    onVis();
    return ()=>{
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('focus', onVis);
      window.removeEventListener('blur', onVis);
    };
  },[]);

  useEffect(()=>{
    setPdfs(state.libraryPdfs || []);
  }, [state.libraryPdfs]);

  useEffect(()=>{
    return ()=>{
      Object.values(pdfUrlsRef.current || {}).forEach(url=>URL.revokeObjectURL(url));
      pdfUrlsRef.current = {};
    };
  }, []);

  useEffect(()=>{
    let cancelled = false;
    (pdfs || []).forEach(p=>{
      const key = pdfKey(p);
      if (!key || pdfUrlsRef.current[key] || p?.dataUrl) return;
      loadPdfBlob(key).then(blob=>{
        if (cancelled || !blob) return;
        const url = URL.createObjectURL(blob);
        pdfUrlsRef.current = {...pdfUrlsRef.current, [key]:url};
        setPdfBlobUrls(prev=>({...prev, [key]:url}));
      }).catch(()=>{});
    });
    return ()=>{ cancelled = true; };
  }, [pdfs]);

  useEffect(()=>{
    const migrated = [];
    const urlUpdates = {};
    (pdfs || []).forEach(p=>{
      const key = pdfKey(p);
      if (!key || !p?.dataUrl || pdfUrlsRef.current[key]) return;
      try {
        const blob = dataUrlToBlob(p.dataUrl);
        const url = URL.createObjectURL(blob);
        urlUpdates[key] = url;
        migrated.push(key);
        savePdfBlob(key, blob, {...p, size:blob.size, type:blob.type}).catch(()=>{});
      } catch(e){}
    });
    if (!migrated.length) return;
    pdfUrlsRef.current = {...pdfUrlsRef.current, ...urlUpdates};
    setPdfBlobUrls(prev=>({...prev, ...urlUpdates}));
    const next = (pdfs || []).map(p => migrated.includes(pdfKey(p)) ? serializeLibraryPdf(p) : p);
    setPdfs(next);
    setState(prev=>({...prev, libraryPdfs:serializeLibraryPdfs(next)}));
  }, [pdfs]);

  useEffect(()=>{
    if (!pdfViewing && pdfFullscreen) setPdfFullscreen(false);
  }, [pdfViewing, pdfFullscreen]);

  const exitPdfFullscreen = ()=>{ setPdfFullscreen(false); };
  useEffect(()=>{
    const onKey = (e)=>{ if (e.key === 'Escape' && pdfFullscreen) exitPdfFullscreen(); };
    window.addEventListener('keydown', onKey);
    return ()=> window.removeEventListener('keydown', onKey);
  }, [pdfFullscreen]);

  // Time tracker — only ticks when concept is open AND tab is focused
  useEffect(()=>{
    intRef.current = setInterval(()=>{
      if (!activeConceptId && !pdfViewing) return;
      if (!visRef.current) return;
      setTick(t=>t+1);
      // increment seconds + grant insight using the latest state snapshot
      setState(prev=>{
        const today = insightsToday(prev);
        // Always tick lifetime reading ms (no daily cap on this stat)
        const lifetimeMs = (prev.stats?.totalReadingMs || 0) + 1000;
        const baseStats = { ...(prev.stats || {}), totalReadingMs: lifetimeMs };
        if (today.insightsEarned >= INSIGHT_CAP_DAILY) return { ...prev, stats: baseStats };
        const newSeconds = today.secondsRead + 1;
        let newEarned = today.insightsEarned;
        let newSinceLast = newSeconds - (today.insightsEarned * INSIGHT_SECONDS_PER);
        let nextState = {...prev, stats: baseStats, library:{dayKey:today.dayKey, secondsRead:newSeconds, insightsEarned:today.insightsEarned}};
        if (newSinceLast >= INSIGHT_SECONDS_PER && newEarned < INSIGHT_CAP_DAILY){
          newEarned += 1;
          nextState = grantInsight({...nextState, library:{...nextState.library, insightsEarned:newEarned}}, 1);
        }
        return nextState;
      });
    }, 1000);
    return ()=> clearInterval(intRef.current);
  // eslint-disable-next-line
  },[activeConceptId, pdfViewing]);
  
  // Check if player can prestige (all modules mastered, max level)
  const canPrestige = (() => {
    const lvl = levelFromXp(state.xp || 0);
    if (lvl.level < 20) return false;
    const arena = state.arena || {};
    const weapons = arena.weapons || {};
    const allMaxed = Object.values(weapons).every(w => w.level >= 10);
    return allMaxed && lvl.level >= 20;
  })();
  
  // Perform prestige
  const doPrestige = () => {
    if (!selectedPerk) return;
    const nextRank = (state.prestigeRank || 0) + 1;
    const newArena = defaultArenaState();
    setState(prev => ({
      ...prev,
      xp: 0,
      prestigeRank: nextRank,
      prestigePerk: selectedPerk,
      arena: newArena,
    }));
    setShowPrestigeModal(false);
    setPrestigeConfirm(false);
    setSelectedPerk(null);
  };
  
  const today = insightsToday(state);
  const fmt = (s)=>{
    const m = Math.floor(s/60), ss = s%60;
    return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  };
  const nextInsightIn = today.insightsEarned >= INSIGHT_CAP_DAILY
    ? 'Daily cap reached'
    : fmt(INSIGHT_SECONDS_PER - (today.secondsRead - today.insightsEarned*INSIGHT_SECONDS_PER));

  const activeModule = ALL_MODS.find(m=>m.id===activeModuleId) || mod;
  const activeConcept = activeConceptId
    ? activeModule.levels.flatMap(l=>l.concepts).find(c=>c.id===activeConceptId)
    : null;

  // PDF upload — tagged with current module
  const handlePdf = (e)=>{
    const files = e.target.files;
    if (!files || files.length===0) return;
    const tagModule = activeModuleId;
    const entries = registerPdfFiles(files, tagModule);
    if (entries.length){
      const next = [...pdfs, ...entries];
      setPdfs(next);
      setState(prev=>({...prev, libraryPdfs:serializeLibraryPdfs(next)}));
      if (entries.length===1) setPdfViewing(entries[0]);
    }
    e.target.value = '';
  };

  // Folder import: PDFs are auto-assigned to the currently selected module.
  const importFolder = async ()=>{
    if (!window.showDirectoryPicker){
      alert('Folder import needs a recent Chrome/Edge browser.');
      return;
    }
    try {
      const dir = await window.showDirectoryPicker();
      const found = [];
      const walk = async (directory)=>{
        for await (const entry of directory.values()){
          if (entry.kind==='directory'){
            await walk(entry);
          } else if (entry.kind==='file' && /\.pdf$/i.test(entry.name)){
            const file = await entry.getFile();
            found.push(file);
          }
        }
      };
      await walk(dir);
      if (!found.length){ alert('No PDFs found.'); return; }
      const entries = registerPdfFiles(found, activeModuleId);
      const next = [...pdfs, ...entries];
      setPdfs(next);
      setState(prev=>({...prev, libraryPdfs:serializeLibraryPdfs(next)}));
      alert('Imported '+entries.length+' PDF(s) into '+activeModuleId+'.');
    } catch(err){ /* user cancelled */ }
  };

  const removePdf = (entry)=>{
    const key = pdfKey(entry);
    if (key && pdfUrlsRef.current[key]){
      URL.revokeObjectURL(pdfUrlsRef.current[key]);
      const nextUrls = {...pdfUrlsRef.current};
      delete nextUrls[key];
      pdfUrlsRef.current = nextUrls;
      setPdfBlobUrls(nextUrls);
    }
    if (key) deletePdfBlob(key).catch(()=>{});
    const next = pdfs.filter(p=>pdfKey(p)!==key);
    setPdfs(next);
    setState(prev=>({...prev, libraryPdfs:serializeLibraryPdfs(next)}));
    if (pdfKey(pdfViewing)===key) {
      setPdfViewing(null);
      setPdfFullscreen(false);
    }
  };

  const setPdfModule = (entry, moduleId)=>{
    const key = pdfKey(entry);
    const next = pdfs.map(p=> pdfKey(p)===key ? {...p, moduleId} : p);
    setPdfs(next);
    setState(prev=>({...prev, libraryPdfs:serializeLibraryPdfs(next)}));
    if (pdfKey(pdfViewing)===key) setPdfViewing(prev=>prev ? {...prev, moduleId} : prev);
  };

  const renderPdfViewer = (fullscreen=false)=>{
    if (!pdfViewing) return null;
    const src = pdfSrc(pdfViewing);
    return (
      <>
        <div className="row library-pdf-toolbar" style={{justifyContent:'space-between',marginBottom:8,gap:8}}>
          <h3>📄 {pdfViewing.name}</h3>
          <div className="row" style={{gap:6}}>
            {fullscreen && <button className="btn ghost sm" onClick={exitPdfFullscreen}>✕ Close</button>}
            <button className="btn ghost sm" onClick={()=>setPdfFullscreen(v=>!v)}>
              {fullscreen ? 'Exit fullscreen' : 'Fullscreen'}
            </button>
            <button className="btn ghost sm" onClick={()=>{setPdfViewing(null);setPdfFullscreen(false);}}>Close PDF</button>
            <button className="btn ghost sm" onClick={()=>removePdf(pdfViewing)}>Delete</button>
          </div>
        </div>
        {src ? (
          <iframe src={src} className={'library-pdf'+(fullscreen?' fullscreen':'')} title={pdfViewing.name}/>
        ) : (
          <div className={'library-empty pdf-missing'+(fullscreen?' fullscreen':'')}>
            <div style={{fontSize:34,opacity:0.35,marginBottom:10}}>📄</div>
            <h3>PDF file data is not loaded</h3>
            <div className="muted">Re-upload this PDF to view it again. New large PDFs are stored outside the save file so the game does not hit browser storage limits.</div>
          </div>
        )}
      </>
    );
  };

  return (
    <div>
      <h2>📚 Library</h2>
      <div className="muted" style={{marginBottom:12}}>
        Read concept notes or your uploaded PDFs. Stay focused for 5 minutes to earn an insight (max {INSIGHT_CAP_DAILY}/day, {INSIGHT_MAX_BALANCE} total balance). Time only counts when this tab is in focus.
      </div>

      {/* Insight tracker */}
      <div className="card library-tracker">
        <div className="row" style={{justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div className="row" style={{gap:14}}>
            <div>
              <div className="tiny">READING TIME TODAY</div>
              <div style={{font:'600 22px/1 "JetBrains Mono", monospace',color:'var(--text)'}}>{fmt(today.secondsRead)}</div>
            </div>
            <div>
              <div className="tiny">NEXT INSIGHT IN</div>
              <div style={{font:'600 16px/1 "JetBrains Mono", monospace',color:'var(--accent)'}}>{nextInsightIn}</div>
            </div>
            <div>
              <div className="tiny">TODAY</div>
              <div style={{font:'600 16px/1 "JetBrains Mono", monospace',color:'var(--text)'}}>{today.insightsEarned} / {INSIGHT_CAP_DAILY}</div>
            </div>
            <div>
              <div className="tiny">BALANCE</div>
              <div style={{font:'600 16px/1 "JetBrains Mono", monospace',color:'var(--ok)'}}>💡 {state.insights||0} / {INSIGHT_MAX_BALANCE}</div>
            </div>
          </div>
          {(activeConcept || pdfViewing) ? (
            <span className="chip ok">⏱ counting…</span>
          ) : (
            <span className="chip warn">Open a concept or PDF to start counting</span>
          )}
        </div>
      </div>
      
      {/* PRESTIGE TERMINAL */}
      <div className="card" style={{marginTop:12,background:'#1a1a2a',border:'2px solid var(--warn)'}}>
        <div className="row" style={{justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <h3 style={{color:'var(--warn)',margin:0}}>⚡ Ascended Scholar Terminal</h3>
          <span className="chip" style={{background:'var(--panel2)',fontSize:11}}>Rank {state.prestigeRank || 0}</span>
        </div>
        
        {state.prestigeRank > 0 ? (
          <div>
            <div className="row" style={{gap:12,marginBottom:8}}>
              <div className="card" style={{flex:1,textAlign:'center',padding:8}}>
                <div style={{fontSize:24,color:PRESTIGE_RANKS.find(r=>r.rank===state.prestigeRank)?.color || '#fff'}}>{PRESTIGE_RANKS.find(r=>r.rank===state.prestigeRank)?.numeral || '0'}</div>
                <div className="tiny">Prestige Rank</div>
              </div>
              <div className="card" style={{flex:1,textAlign:'center',padding:8}}>
                <div style={{fontSize:20}}>{state.prestigePerk ? PRESTIGE_PERKS.find(p=>p.id===state.prestigePerk)?.icon : '❌'}</div>
                <div className="tiny">{state.prestigePerk ? PRESTIGE_PERKS.find(p=>p.id===state.prestigePerk)?.name : 'No perk selected'}</div>
              </div>
              <div className="card" style={{flex:1,textAlign:'center',padding:8}}>
                <div style={{fontSize:20}}>+{(state.prestigeRank || 0) * 20}%</div>
                <div className="tiny">XP & Lore Bonus</div>
              </div>
            </div>
            
            {/* Hall of Fame */}
            <div style={{marginTop:8,padding:8,background:'var(--panel)',borderRadius:6}}>
              <div className="tiny muted" style={{marginBottom:4}}>🏆 Hall of Fame (Rank {state.prestigeRank} records):</div>
              {Object.keys(state.prestigeTimes || {}).length === 0 ? (
                <div className="tiny muted">No records yet. Complete raids to set times!</div>
              ) : (
                Object.entries(state.prestigeTimes).map(([key, time], i) => (
                  <div key={i} className="row" style={{justifyContent:'space-between',fontSize:11}}>
                    <span>{key}</span>
                    <span style={{color:'var(--accent)'}}>{Math.floor(time/60)}m {time%60}s</span>
                  </div>
                ))
              )}
            </div>
          </div>
        ) : (
          <div>
            <div className="tiny muted" style={{marginBottom:8}}>
              Unlock new prestige rewards when you master all modules and reach the maximum level.
            </div>
            <div className="row" style={{gap:6,flexWrap:'wrap',marginBottom:8}}>
              {PRESTIGE_PERKS.map(p => (
                <div key={p.id} className="card" style={{padding:6,flex:'1 1 45%',border:'1px solid var(--line)',opacity:0.7}}>
                  <div style={{fontSize:18}}>{p.icon}</div>
                  <div className="tiny" style={{fontWeight:600}}>{p.name}</div>
                  <div className="tiny muted">{p.desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        
        {canPrestige && (
          <div className="card" style={{marginTop:8,background:'rgba(255,200,0,0.08)',border:'1px solid var(--warn)',textAlign:'center'}}>
            <div className="tiny" style={{marginBottom:6}}>You are ready to ascend to the next rank!</div>
            <button className="btn" style={{background:'var(--warn)',color:'#000',fontWeight:700}} onClick={()=>setShowPrestigeModal(true)}>
              ⚡ PRESTIGE — RANK {(state.prestigeRank||0)+1}
            </button>
          </div>
        )}
      </div>
      
      {showPrestigeModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={(e)=>{ if(e.target===e.currentTarget)setShowPrestigeModal(false); }}>
          <div className="card" style={{maxWidth:500,width:'90%',background:'#1a1a2a',border:'2px solid var(--warn)'}}>
            <div className="row" style={{justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <h3 style={{color:'var(--warn)',margin:0}}>⚡ Ascend to Rank {(state.prestigeRank||0)+1}</h3>
              <button className="btn ghost sm" onClick={()=>setShowPrestigeModal(false)}>×</button>
            </div>
            <div style={{marginBottom:12,padding:8,background:'rgba(255,100,0,0.1)',borderRadius:6,border:'1px solid rgba(255,100,0,0.3)'}}>
              <div className="tiny warn" style={{fontWeight:700,marginBottom:4}}>⚠️ ASCENSION COSTS:</div>
              <div className="tiny" style={{marginBottom:2}}>• Level resets to 1 (all XP lost)</div>
              <div className="tiny" style={{marginBottom:2}}>• All weapons reset to Level 1</div>
              <div className="tiny" style={{marginBottom:2}}>• Skill Tree wiped (SP refunded)</div>
              <div className="tiny">• Insights & progress retained</div>
            </div>
            <div className="tiny" style={{marginBottom:8}}>Choose your Prestige Perk:</div>
            <div className="grid auto" style={{marginBottom:12}}>
              {PRESTIGE_PERKS.map(p => (
                <div key={p.id} onClick={()=>setSelectedPerk(p.id)}
                  className="card" style={{padding:8,cursor:'pointer',border:'2px solid',borderColor:selectedPerk===p.id?'var(--warn)':'var(--line)',background:selectedPerk===p.id?'rgba(255,200,0,0.1)':'transparent',textAlign:'center'}}>
                  <div style={{fontSize:28,marginBottom:4}}>{p.icon}</div>
                  <div className="tiny" style={{fontWeight:700}}>{p.name}</div>
                  <div className="tiny muted">{p.desc}</div>
                </div>
              ))}
            </div>
            <div className="row" style={{gap:8,justifyContent:'center'}}>
              {prestigeConfirm ? (
                <>
                  <button className="btn" style={{background:'var(--warn)',color:'#000'}} onClick={doPrestige} disabled={!selectedPerk}>⚡ CONFIRM ASCENSION</button>
                  <button className="btn ghost" onClick={()=>setPrestigeConfirm(false)}>Cancel</button>
                </>
              ) : (
                <button className="btn" style={{background:'var(--warn)',color:'#000'}} onClick={()=>setPrestigeConfirm(true)} disabled={!selectedPerk}>Choose Perk & Ascend</button>
              )}
            </div>
          </div>
        </div>
      )}
      
      <div className="library-layout">
        {/* Left rail — module + concept browser */}
        <div className="card library-rail">
          <h3>Modules</h3>
          <div style={{maxHeight:'280px',overflow:'auto',marginBottom:12}}>
            {ALL_MODS.map(m=>(
              <button key={m.id}
                className={'library-mod-btn'+(activeModuleId===m.id?' active':'')}
                onClick={()=>{ setActiveModuleId(m.id); setActiveConceptId(null); setPdfViewing(null); }}>
                <span>{m.id}</span>
                <span className="tiny">{m.levels.reduce((a,l)=>a+l.concepts.length,0)} concepts</span>
              </button>
            ))}
          </div>
          <h3>{activeModule.id} concepts</h3>
          <div style={{maxHeight:'380px',overflow:'auto'}}>
            {activeModule.levels.map(lv=>(
              <React.Fragment key={lv.id}>
                <div className="library-lvl">{lv.name}</div>
                {lv.concepts.map(c=>(
                  <button key={c.id}
                    className={'library-concept-btn'+(activeConceptId===c.id?' active':'')}
                    onClick={()=>{ setActiveConceptId(c.id); setPdfViewing(null); }}>
                    {c.name}
                  </button>
                ))}
              </React.Fragment>
            ))}
          </div>

          <h3>PDFs · {activeModule.id}</h3>

            </label>
          </div>
          <div style={{marginTop:8,maxHeight:'420px',overflow:'auto'}}>
            {(()=>{
              const filtered = showAllPdfs ? pdfs : pdfs.filter(p => p.moduleId===activeModuleId);
              if (filtered.length===0) {
                return <div className="tiny" style={{padding:'8px 0'}}>

                </div>;
              }
              return filtered.map((p,i)=>(
                <div key={pdfKey(p) || i} className={'library-pdf-row'+(pdfKey(pdfViewing)===pdfKey(p)?' active':'')}>
                  <button className="library-pdf-name" onClick={()=>{ setPdfViewing(p); setActiveConceptId(null); }}>📄 {p.name}</button>
                  <select className="pdf-mod-select" value={p.moduleId||''} onChange={e=>setPdfModule(p, e.target.value||null)} title="Reassign to module">
                    <option value="">(no module)</option>

                  <button className="btn ghost sm" onClick={()=>removePdf(p)}>×</button>
                </div>
              ));

          </div>
          <div className="tiny" style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--line)'}}>
            <b>Tip:</b> <b>Import folder</b> now tags every imported PDF to the module currently selected in the left Modules list.
          </div>
        </div>
      </div>
    </div>
  );
}


/* ============ WORLD FLOW: Dojo / Practice / Street / Elite / Boss ============ */

const ELITE_MASTERY_THRESHOLD = 0.6; // 60% of a level's concepts at SR interval >= 7

function masteryOfLevel(state, level){
  const sr = state.sr || {};
  let mastered = 0;
  for (const c of level.concepts){
    if (c.questions.some(q => (sr[q.id]||{}).interval >= 7)) mastered++;
  }
  return { mastered, total: level.concepts.length, frac: level.concepts.length===0 ? 0 : mastered/level.concepts.length };
}

function eliteUnlocked(state, mod, levelId){
  const lv = mod.levels.find(l=>l.id===levelId); if (!lv) return false;
  const m = masteryOfLevel(state, lv);
  const beaten = (state.arena && state.arena.bossesBeaten) || {};
  const streetBossId = mod.id+'_street_'+levelId;
  return (m.frac >= ELITE_MASTERY_THRESHOLD) || (beaten[streetBossId] === true);
}

function bossUnlocked(state, arena, mod){
  const beaten = arena.bossesBeaten || {};
  return mod.levels.every(lv => beaten[mod.id+'_elite_'+lv.id]);
}

/* Per-biome emoji palettes — `getBiome` (arena_runtime.jsx) decides which biome
 * each module gets; we just look up the right palette from biome.id. Streets
 * cycle through the street pool by level index, elites use the elite emoji,
 * bosses use the boss emoji. Falls back to the originals if biome unknown. */
const BIOME_EMOJI_PALETTES = {
  server_room: { street:['🖥️','🔌','💾','📡'],   elite:'⚡',  boss:'🌐' },
  library:     { street:['📚','🪑','🕯️','📖'],   elite:'📜',  boss:'🦉' },
  cyberpunk:   { street:['🌃','🛵','🍜','🕶️'],   elite:'🤖',  boss:'👁️' },
  cathedral:   { street:['⛪','🕯️','🪦','🔔'],   elite:'👼',  boss:'⚖️' },
  wasteland:   { street:['🏜️','💀','🦴','☢️'],   elite:'🦅',  boss:'🐍' },
  lab:         { street:['🧪','⚗️','🔬','💊'],   elite:'🧬',  boss:'☣️' },
  boss_sanctum:{ street:['👑','🗡️','🛡️','🏰'],  elite:'⚔️',  boss:'👑' },
  foundry:     { street:['🔥','🔨','⚒️','🪨'],   elite:'🌋',  boss:'🐉' },
  sky:         { street:['🌤️','☁️','🪁','✈️'],  elite:'🦅',  boss:'⛈️' },
  quarantine:  { street:['☣️','🦠','💉','🧫'],   elite:'🦟',  boss:'☠️' },
  corridor:    { street:['🌀','🌫️','🪞','🎭'],  elite:'👁️',  boss:'∞' },
  deep_web:    { street:['🌐','🕸️','🦑','🌑'],   elite:'🦈',  boss:'🐙' },
  high_speed:  { street:['⚡','🚀','💨','📈'],   elite:'🏎️',  boss:'⚡' },
  abandoned:   { street:['🏚️','📦','🕸️','🪦'],  elite:'🐀',  boss:'👻' },
  void:        { street:['🌑','⚫','🕳️','✨'],    elite:'👻',  boss:'🌌' },
  default:     { street:['🥊','👊','🤺','⚔️'],   elite:'⭐',  boss:'👑' },
};

function biomePalette(modId){
  const b = (typeof getBiome === 'function') ? getBiome(modId) : null;
  return BIOME_EMOJI_PALETTES[b?.id] || BIOME_EMOJI_PALETTES.default;
}

function genWorld(mod){
  const subj = mod.name || mod.id;
  const palette = biomePalette(mod.id);
  return {
    moduleId: mod.id,
    name: subj,
    streets: mod.levels.map((lv, idx) => ({
      tier: lv.tier || (idx+1),
      chapter: 'Chapter ' + (idx+1) + '.1',
      name: 'Chapter ' + (idx+1) + '.1 · ' + lv.name,
      emoji: palette.street[idx % palette.street.length],
      hp: 50 + (idx+1)*25,
      dmg:{light: 5+(idx+1)*2, heavy: 9+(idx+1)*3},
      pattern: ['light','light',idx>0?'heavy':''].filter(Boolean),
      id: mod.id+'_street_'+lv.id,
      levelId: lv.id,
      subject: subj,
      kind:'street',
    })),
    elites: mod.levels.map((lv, idx) => ({
      id: mod.id+'_elite_'+lv.id, kind:'elite',
      chapter: 'Chapter ' + (idx+1) + '-Elite',
      name: 'Chapter ' + (idx+1) + '-Elite · ' + lv.name,
      levelId: lv.id, subject: subj, emoji: palette.elite,
      hp: 110, dmg:{light:9, heavy:17},
      pattern:['light','heavy','light','heavy','heavy'],
    })),
    boss: {
      id: mod.id+'_finalboss', kind:'boss',
      chapter: 'Final Chapter',
      name: 'Final Chapter · ' + subj, subject: subj, emoji: palette.boss,
      hp: 200, dmg:{light:12, heavy:24},
      pattern:['heavy','light','heavy','heavy','light','heavy'],
    },
    practice: {
      id: mod.id+'_practice', kind:'practice',
      name:'Training Dummy', subject:subj, emoji:'🪵',
      hp: 9999, dmg:{light:0, heavy:0},
      pattern:['light','light'],
    },
  };
}

/* ---------- WORLD VIEW (per-module hub) ---------- */

    const m = masteryOfLevel(state, lv);
    const unlocked = eliteUnlocked(state, mod, lv.id);
    const elite = world.elites.find(e=>e.levelId===lv.id);
    const isBeat = !!beaten[elite.id];
    return { lv, m, unlocked, elite, isBeat };

      </div>
    </div>
  );
}

/* ---------- INSIGHTS PANEL (used inside CombatScreen) ---------- */
function InsightsPanel({ state, setState, allowed, used, max, onHint, onReroll, onRestoreStreak, canRestore }){
  if (!allowed){
    return <div className="insights-panel disabled"><span className="tiny">💡 Insights disabled in this fight</span></div>;
  }
  const remaining = max==null ? Infinity : Math.max(0, max-used);
  const insights = state.insights || 0;
  const can = (cost)=> insights>=cost && remaining>0;
  return (
    <div className="insights-panel">
      <div className="row" style={{justifyContent:'space-between',marginBottom:6}}>
        <span className="tiny">💡 INSIGHTS · balance {insights}{max!=null?(' · '+remaining+' uses left this fight'):''}</span>
      </div>
      <div className="row" style={{gap:6,flexWrap:'wrap'}}>
        <button className="btn ghost sm" disabled={!can(1)} onClick={onHint}>💡 Hint (1)</button>
        <button className="btn ghost sm" disabled={!can(2)} onClick={onReroll}>🎲 New question (2)</button>
        <button className="btn ghost sm" disabled={!can(3) || !canRestore} onClick={onRestoreStreak}>🔥 Restore streak (3)</button>
      </div>
    </div>
  );
}

/* ---------- PRACTICE TOPIC SELECTOR ---------- */
function PracticeSelect({ mod, onStart }){
  const [showMenu, setShowMenu] = React.useState(false);
  const [selected, setSelected] = React.useState(() => {
    const all = mod.levels.flatMap(l => l.concepts.map(c => c.id));
    return new Set(all);
  });
  
  const toggle = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };
  
  const allSelected = selected.size === mod.levels.flatMap(l=>l.concepts).length;
  const toggleAll = () => {
    if (allSelected){
      setSelected(new Set());
    } else {
      setSelected(new Set(mod.levels.flatMap(l => l.concepts.map(c => c.id))));
    }
  };
  
  const handleStart = () => {
    const conceptIds = Array.from(selected);
    onStart(conceptIds);
    setShowMenu(false);
  };
  
  if (!showMenu){
    return <button className="btn ghost" onClick={()=>setShowMenu(true)}>Start Practice</button>;
  }
  
  return (
    <div style={{position:'relative'}}>
      <button className="btn ghost" onClick={()=>setShowMenu(false)}>Cancel</button>
      <div className="card" style={{position:'absolute',right:0,top:'110%',zIndex:50,width:240,maxHeight:300,overflow:'auto',padding:10}}>
        <div className="row" style={{justifyContent:'space-between',marginBottom:8}}>
          <span className="tiny">Select concepts</span>
          <button className="tiny" style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer'}} onClick={toggleAll}>
            {allSelected?'Deselect All':'Select All'}
          </button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {mod.levels.map(lv => (
            <div key={lv.id}>
              <div className="tiny" style={{color:'var(--muted)',marginTop:6}}>{lv.name}</div>
              {lv.concepts.map(c => (
                <label key={c.id} className="row" style={{gap:6,cursor:'pointer',alignItems:'center'}}>
                  <input type="checkbox" checked={selected.has(c.id)} onChange={()=>toggle(c.id)}/>
                  <span className="tiny">{c.name}</span>
                </label>
              ))}
            </div>
          ))}
        </div>
        <button className="btn" style={{marginTop:10,width:'100%'}} onClick={handleStart}>
          Start Practice
        </button>
      </div>
    </div>
  );
}


/* ============ BONUSES: Augments + Pets + Prestige Perks ============ *
 * Standalone helpers — read-only over state.
 * Splice this BEFORE arena.jsx in build_html.py so combat code can call them.
 */

/* ---------- AUGMENT EFFECTS ---------- */
const AUGMENT_EFFECTS = {
  // STARTER KIT (auto-granted in defaultState)
  silicon_skin:    { maxHpBonus: 20 },
  overclock_chip:  { dmgMult: 0.10 },
  firewall_dll:    { blockPerTurn: 5 },
  // RARE — biome / street drops (when implemented)
  grounding_wire:  { biomeDmgReduction: 0.50 },
  scholar_eye:     { revealEnemyHp: true },
  anti_virus:      { immunePoison: true, immuneAmnesia: true },
  reinforced_grip: { blockOnBasic: 15 },
  thorned_pommel:  { thornsRatio: 0.20 },
  // EPIC
  buffer_overflow: { capLargeHits: 10 },
  insight_loop:    { insightSaveChance: 0.20 },
  momentum_battery:{ maxMomentumBonus: 1 },
  data_miner:      { xpBonus: 0.25 },
  // LEGENDARY (raid drops, when implemented)
  capacitor_404:   { hpCap: 10, dmgMult: 2.0 },
  proctor_lens:    { highlightCorrect: true },
  god_mode_exe:    { reviveAtOne: true },
  silver_bullet:   { firstHitMaxHpDmg: 1.0 },
  overflowing_chalice: { uncappedInsights: true },
};

function getAugmentBonuses(state){
  const totals = {
    maxHpBonus: 0, dmgMult: 0, blockPerTurn: 0,
    biomeDmgReduction: 0, blockOnBasic: 0, thornsRatio: 0,
    capLargeHits: 0, insightSaveChance: 0, maxMomentumBonus: 0, xpBonus: 0,
    hpCap: null, reviveAtOne: false,
    revealEnemyHp: false, immunePoison: false, immuneAmnesia: false,
    highlightCorrect: false, firstHitMaxHpDmg: 0, uncappedInsights: false,
  };
  const eq = (state.inventory && state.inventory.equipment) || {};
  for (const id of Object.keys(eq)){
    const item = eq[id];
    if (!item || !item.quantity) continue;
    const fx = AUGMENT_EFFECTS[id];
    if (!fx) continue;
    for (const k of Object.keys(fx)){
      if (typeof fx[k] === 'boolean')      totals[k] = totals[k] || fx[k];
      else if (k === 'hpCap')              totals[k] = totals[k] === null ? fx[k] : Math.min(totals[k], fx[k]);
      else                                  totals[k] = (totals[k] || 0) + fx[k];
    }
  }
  if (totals.hpCap !== null) totals.maxHpBonus = 0;
  return totals;
}

/* ---------- LIFETIME STATS → BUFFS ---------- */
const STAT_BUFF_TIERS = [
  { stat:'totalCorrect',    per: 100,     key:'maxHpBonus',       value: 1,    max: 20,  label:'+1 Max HP per 100 lifetime correct',   icon:'❤️', cap:'+20 HP' },
  { stat:'totalKills',      per: 250,     key:'flatDmg',          value: 1,    max: 10,  label:'+1 base dmg per 250 lifetime kills',   icon:'⚔️', cap:'+10 dmg' },
  { stat:'totalReadingMs',  per: 3600000, key:'insightCapBonus',  value: 1,    max: 5,   label:'+1 Insight cap per hour read',         icon:'💡', cap:'+5 cap' },
  { stat:'totalFightsWon',  per: 50,      key:'maxMomentumBonus', value: 1,    max: 3,   label:'+1 max momentum per 50 fights won',    icon:'⚡', cap:'+3 mom' },
  { stat:'totalDmgDealt',   per: 5000,    key:'critChance',       value: 0.01, max: 0.10, label:'+1% crit per 5000 lifetime dmg dealt', icon:'🎯', cap:'+10% crit' },
];

function getStatBuffs(stats){
  const out = {};
  if (!stats) return out;
  for (const tier of STAT_BUFF_TIERS){
    const raw = Math.floor((stats[tier.stat] || 0) / tier.per) * tier.value;
    const capped = Math.min(tier.max, raw);
    if (capped > 0) out[tier.key] = (out[tier.key] || 0) + capped;
  }
  return out;
}

function statBuffProgress(stats, tier){
  const cur = stats?.[tier.stat] || 0;
  const tiersUnlocked = Math.min(tier.max / tier.value, Math.floor(cur / tier.per));
  const nextThreshold = (tiersUnlocked + 1) * tier.per;
  const intoCurrent = cur - (tiersUnlocked * tier.per);
  const atMax = tiersUnlocked >= (tier.max / tier.value);
  return { tiersUnlocked, nextThreshold, intoCurrent, atMax, current: cur };
}

function addStat(state, key, delta){
  if (!delta) return state;
  return { ...state, stats: { ...(state.stats || {}), [key]: ((state.stats && state.stats[key]) || 0) + delta } };
}

/* ---------- PET XP / LEVELS ---------- */
const PET_XP_THRESHOLDS = [0, 30, 80, 150, 250]; // index = level (0..4 for levels 1..5)
const PET_MAX_LEVEL = 5;

function petLevelFromXp(xp){
  let lvl = 1;
  for (let i = 1; i < PET_XP_THRESHOLDS.length; i++){
    if ((xp || 0) >= PET_XP_THRESHOLDS[i]) lvl = i + 1;
  }
  return Math.min(PET_MAX_LEVEL, lvl);
}

function petXpProgress(xp){
  const lvl = petLevelFromXp(xp);
  if (lvl >= PET_MAX_LEVEL) return { level: lvl, xp: xp || 0, intoCurrent: 0, span: 0, pct: 100, max: true };
  const lower = PET_XP_THRESHOLDS[lvl - 1];
  const upper = PET_XP_THRESHOLDS[lvl];
  const intoCurrent = (xp || 0) - lower;
  const span = upper - lower;
  return { level: lvl, xp: xp || 0, intoCurrent, span, pct: Math.round((intoCurrent / span) * 100), max: false };
}

function getPetLevel(state){
  if (!state.pet) return 1;
  return petLevelFromXp((state.petXp || {})[state.pet]?.xp || 0);
}

function addPetXp(state, amount){
  if (!state.pet || !amount) return state;
  const cur = state.petXp || {};
  const old = cur[state.pet] || { xp: 0 };
  return { ...state, petXp: { ...cur, [state.pet]: { ...old, xp: (old.xp || 0) + amount } } };
}

/* Scale factor: level 1 = 1.0, level 5 = 2.0 (each level adds 25%). */
function petScale(level){ return 1 + ((Math.max(1, level) - 1) * 0.25); }

/* ---------- PET REGISTRY + EVENT HOOKS ---------- */
const PET_REGISTRY = {

  syntax_fox: { id:'syntax_fox', name:'Syntax',     icon:'🦊', tier:'rare',      desc:'+5% damage per combo step (max +25%). Punishes streak loss with -5 HP.' },
